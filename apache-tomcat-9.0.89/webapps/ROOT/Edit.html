<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>동적 Edit와 Button 생성</title>
</head>
<body>
<button onclick="createEditableWithButton()">Edit & Button 생성</button>
<div id="mainframe.QuickViewFrame.form.Edit00" role="" aria-description="" aria-disabled="false" data-userstatus="nulltext" data-status="">
<label for="mainframe.QuickViewFrame.form.Edit00:input" aria-hidden="true"></label>
<input id="mainframe.QuickViewFrame.form.Edit00:input" value="에디트111" autocomplete="new-password" type="text" tabindex="0" aria-label=" 라벨3 " aria-readonly="false"></div>
<textarea rows ="4" cols="50" id="mainframe.QuickViewFrame.form.Edit00:textarea" aria-label="라벨2" aria-readonly="false" tabindex="0">aaa, @bbb, ccc, bbb, ★dd, 9ddd</textarea>

<div id="container"></div>

<script>
function createEditableWithButton() {
  // 편집 가능한 영역 생성
  const editableDiv = document.createElement('text');
  editableDiv.setAttribute('contenteditable', 'true');
  editableDiv.setAttribute('role', 'textbox'); // 웹 접근성: 텍스트 입력으로 인식
  editableDiv.setAttribute('aria-label', '라벨');
  editableDiv.setAttribute('tabindex', '0'); // 키보드 접근 가능
 
  editableDiv.style.border = '1px solid #ccc';
  editableDiv.style.padding = '8px';
  editableDiv.style.marginBottom = '10px';
  editableDiv.style.width = '300px';

  // 버튼 생성
  const button = document.createElement('button');
  button.textContent = '제출';
  button.setAttribute('type', 'button');
  button.setAttribute('aria-label', '텍스트 제출 버튼');

  // DOM에 추가
  const container = document.getElementById('container');
  container.appendChild(editableDiv);
  container.appendChild(button);
}
</script>

</body>
</html>
