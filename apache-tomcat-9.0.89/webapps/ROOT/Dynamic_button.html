<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>정적/동적 div 생성</title>
</head>
<body>
    <h1>정적/동적 div 생성 예제</h1>
    <button onclick="alert('버튼 클릭!')">버튼</button>
    <div id="mainframe.QuickViewFrame.form.ImageViewer00" class="ImageViewer" tabindex="-1" style="left:130px;top:120px;width:200px;height:200px;direction:ltr;" role="img" aria-live="off" aria-description="" aria-label="이미 그려진 대체텍스트 " aria-disabled="false" aria-readonly="false">
        <div class="nexasimplecontainer" id="mainframe.QuickViewFrame.form.ImageViewer00:container" style="width:198px;height:198px;">
            <div id="mainframe.QuickViewFrame.form.ImageViewer00.imagearea" class="ImageAreaControl imagearea" tabindex="-1" style="left:0px;top:0px;width:198px;height:198px;direction:ltr;" role="presentation" aria-live="off" aria-description="" aria-label=" " aria-disabled="false" aria-hidden="true" aria-readonly="false">
                <img id="mainframe.QuickViewFrame.form.ImageViewer00.imagearea:image" alt="" src="http://172.10.12.45:9090/nexacroN/21.0.0.1900/acc_test1_21_1900/_resource_/_theme_/blue/images/titlebar_icon.png" style="left: 91px; top: 91px; direction: ltr; width: 16px; height: 16px;">
            </div>
        </div>
    </div>
    <div id="mainframe.QuickViewFrame.form.imgBanner" class="ImageViewer" role="img" aria-description="" aria-label="동적생성 대체텍스트 " aria-disabled="false" aria-readonly="false" style="left: 420px; top: 120px; width: 200px; height: 200px; direction: ltr;">
        <div class="nexasimplecontainer" id="mainframe.QuickViewFrame.form.imgBanner:container" style="left: 0px; top: 0px; width: 198px; height: 198px;">
            <div id="mainframe.QuickViewFrame.form.imgBanner.imagearea" class="ImageAreaControl imagearea" tabindex="-1" role="presentation" aria-description="" aria-label=" " style="left: 0px; top: 0px; width: 198px; height: 198px; direction: ltr;" aria-disabled="false" aria-readonly="false">
                <img id="mainframe.QuickViewFrame.form.imgBanner.imagearea:image" alt="" src="http://172.10.12.45:9090/nexacroN/21.0.0.1900/acc_test1_21_1900/_resource_/_theme_/blue/images/titlebar_icon.png" style="left: 91px; top: 91px; direction: ltr; width: 16px; height: 16px;">
            </div>
        </div>
    </div>
  <!-- 정적 div -->
  <div role="image" aria-label="정적으로 만든 컴포넌트" style="width:100px; height:100px; background-color:lightblue;">
    <img id="mainframe.QuickViewFrame.form.imgBanner.imagearea:image" alt="" src="http://172.10.12.45:9090/nexacroN/21.0.0.1900/acc_test1_21_1900/_resource_/_theme_/blue/images/titlebar_icon.png" style="left: 91px; top: 91px; direction: ltr; width: 16px; height: 16px;">
  </div>

  <!-- 동적 div를 삽입할 위치 -->
  <div id="container"></div>

  <script>
    // div 생성
    const dynamicDiv = document.createElement('div');
    dynamicDiv.setAttribute('role', 'image');
    dynamicDiv.setAttribute('aria-label', '동적으로 만든 컴포넌트');
    dynamicDiv.style.border = '1px solid #ccc';
    dynamicDiv.style.display = 'inline-block';
    dynamicDiv.style.padding = '10px';

    // img 태그 생성
    const img = document.createElement('img');
    img.src = 'http://172.10.12.45:9090/nexacroN/21.0.0.1900/acc_test1_21_1900/_resource_/_theme_/blue/images/titlebar_icon.png'; // 예시 이미지 URL
    img.alt = '예시 이미지';
    img.style.width = '100px';
    img.style.height = '100px';

    // img를 div에 넣기
    dynamicDiv.appendChild(img);

    // div를 문서에 추가
    document.getElementById('container').appendChild(dynamicDiv);
  </script>
</body>
</html>
