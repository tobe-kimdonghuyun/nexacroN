<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>접근성 트리</title>
  <style>
    [role="treeitem"] {
      cursor: pointer;
      padding: 2px;
    }
    [role="treeitem"]:focus {
      outline: 2px solid blue;
      background-color: #eef;
    }
    [hidden] {
      display: none;
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">본문으로 건너뛰기</a>

  <main id="main" role="main">
    <h1>트리 샘플 01</h1>

    <p id="iframe-desc">아래 샘플 프레임은 접근성 예시용 콘텐츠를 포함합니다.</p>

    <button id="btn-before" type="button" aria-controls="sample-iframe" aria-describedby="iframe-desc">프레임으로 이동 (위)</button>

    <iframe id="sample-iframe" src="https://www.neis.go.kr/thirdparty/toasteditor/nexacro_webeditor_pa.html" title="샘플 프레임" style="width:100%;height:240px;border:1px solid #ccc;margin:8px 0;" aria-describedby="iframe-desc"></iframe>

    <button id="btn-after" type="button">프레임 밖으로 이동 (아래)</button>
  </main>

  <style>
    .skip-link{position:absolute;left:-999px;top:auto;width:1px;height:1px;overflow:hidden}
    .skip-link:focus{position:static;left:0;top:0;background:#000;color:#fff;padding:8px;z-index:1000}
  </style>

  <script>
    (function(){
      var btnBefore = document.getElementById('btn-before');
      var btnAfter = document.getElementById('btn-after');
      var iframe = document.getElementById('sample-iframe');

      btnBefore.addEventListener('click', function(){
        try{
          var idoc = iframe.contentDocument || iframe.contentWindow.document;
          var target = idoc.getElementById('frame-h1');
          if(target){ target.focus(); }
          else { iframe.focus(); }
        } catch(e){ iframe.focus(); }
      });

      btnAfter.addEventListener('click', function(){
        // Move focus to the next logical element after iframe
        btnAfter.focus();
      });

      // Ensure iframe element itself is keyboard-focusable for older UA
      iframe.setAttribute('tabindex','0');
    })();
  </script>
</body>
</html>
