<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>버튼 레이아웃 테스트</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* 화면 스크롤 금지 */
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background-color: #f0f2f5;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        .container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .button-visible {
            margin-top: 50px;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
        }

        .button-visible:hover {
            background-color: #0056b3;
        }

        .button-hidden {
            position: absolute;
            /* 화면 맨 하단으로 보이지 않는 위치에 생성 (위치 더 하단으로 조정) */
            bottom: -500px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="button-visible" id="btn1">첫 번째 버튼 (보임)</button>
        <button class="button-hidden" id="btn2">두 번째 버튼 (숨김)</button>
    </div>
</body>
</html>
