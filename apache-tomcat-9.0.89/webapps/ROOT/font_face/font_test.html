<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Noto Sans 웹폰트 적용 예제</title>
  <style>
    /* 로컬 폰트 등록 */
    @font-face {
      font-family: 'Noto Sans KR';
      src : local("Noto Sans KR Bold");
      src: url(./_font_/NotoSansKR-Bold.woff2) format('woff2'),
      url(./_font_/NotoSansKR-Bold.woff) format('woff'),
      url(./_font_/NotoSansKR-Bold.otf) format('opentype');
      font-weight: 700;
      font-style: normal;
      line-height: normal;

    }

    body {
      font-family: 'Noto Sans', sans-serif;
      margin: 40px;
      background-color: #fff;
      color: #222;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    p {
      font-size: 20px;
      line-height: normal;
    }
  </style>
</head>
<body>
  <h1>Noto Sans 적용 테스트</h1>
  <p>
    총괄 KR-L 환급
  </p>
</body>
</html>
