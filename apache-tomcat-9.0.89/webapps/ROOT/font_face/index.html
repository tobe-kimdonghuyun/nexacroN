<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Font Example</title>
    <!--link
      rel="stylesheet"
      href="http://172.10.12.45:9090/font_face/style.css"
    />
    <-link
      href="http://spoqa.github.io/spoqa-han-sans/css/SpoqaHanSansNeo.css"
      rel="stylesheet"
      type="text/css"
    /-->
  </head>
  <style>
    .Reg {
      font-family: "Spoqa Han Sans Neo Regular";
      font-style: normal;
      font-size: 12px;
      font-weight: 400;
      src: local("SpoqaHanSansNeo-Regular");
      src: url("./_font_/SpoqaHanSansNeo-Regular.otf") format("opentype");
    }
    .Med {
      font-family: "Spoqa Han Sans Neo Medium";
      font-style: normal;
      font-size: 12px;
      font-weight: 500;
      src: local("SpoqaHanSansNeo-Medium");
      src: url("./_font_/SpoqaHanSansNeo-Medium.otf") format("opentype");
    }
    .Bol {
      font-family: "Spoqa Han Sans Neo Bold";
      font-style: normal;
      font-size: 12px;
      font-weight: 700;
      src: local("SpoqaHanSansNeo-Bold");
      src: url("./_font_/SpoqaHanSansNeo-Bold.otf") format("opentype");
    }
  </style>
  <body>
    <div class="Reg">Spoqa Han Sans Neo Regular</div></br>
    <div class="Med">Spoqa Han Sans Neo Regular</div></br>
    <div class="Bol">Spoqa Han Sans Neo Regular</div></br>
  </body>
</html>
