<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>체크박스가 포함된 테이블</title>
    <style>
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
      }
      th {
        background-color: #f2f2f2;
      }
    </style>
  </head>
  <body>
    <h1>체크박스가 포함된 테이블</h1>
    <table>
      <thead>
        <tr>
          <th>
            <input
              type="checkbox"
              id="checkAll"
              role="checkbox"
              onclick="checkAll(this)"
            />
          </th>
          <th>이름</th>
          <th>나이</th>
          <th>직업</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <!--td><input type="checkbox" class="row-check" /></td-->
          <td><input type="button" value="insert" /></td>
          <td>홍길동</td>
          <td>30</td>
          <td>개발자</td>
        </tr>
        <tr>
          <!--td><input type="checkbox" class="row-check" /></td-->
          <td><input type="button" value="delete" /></td>
          <td>김철수</td>
          <td>25</td>
          <td>디자이너</td>
        </tr>
        <tr>
          <!--td><input type="checkbox" class="row-check" /></td-->
          <td><input type="button" value="Add" /></td>
          <td>이영희</td>
          <td>28</td>
          <td>마케터</td>
        </tr>
      </tbody>
    </table
    <input type="button" role ="button" title="툴팁" tabindex="3" ></input>S
    <script>
      function checkAll(element) {
        var checkboxes = document.querySelectorAll(".row-check")
        checkboxes.forEach(function (checkbox) {
          checkbox.checked = element.checked
        })
      }
    </script>
  </body>
</html>
