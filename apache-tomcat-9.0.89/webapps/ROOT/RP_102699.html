<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Button · Select · Div 샘플</title>
  <style>
    /* 시각장애인용 숨김 클래스 */
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
      border: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <!-- 1) button  -->
  <button type="button" id="actionBtn">작동</button>

  <!-- 2) stand-alone select  -->
 
  <select id="outerSelect" name="outerSelect">
    <option value="">-- 선택 --</option>
    <option value="1">옵션 1</option>
    <option value="2">옵션 2</option>
  </select>

  <!-- 3) div 안에 select (aria-label="라벨2") -->
  <div role="group" aria-labelledby="innerLabel">
    
    <select name="innerSelect" aria-label="라벨2">
      <option value="">-- 선택 --</option>
      <option value="a">A</option>
      <option value="b">B</option>
    </select>
  </div>
</body>
</html>
