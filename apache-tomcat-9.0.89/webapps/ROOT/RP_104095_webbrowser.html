<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button and Iframe Sequence</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        iframe {
            width: 300px;
            height: 200px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <!-- Button 1 -->
    <button type="button" onclick="alert('Button 1 clicked')" aria-label="First Alert Button">
        Button 1
    </button>

    <!-- Iframe -->
    <iframe src="about:blank" title="Content Frame"></iframe>

    <!-- Button 2 -->
    <button type="button" onclick="alert('Button 2 clicked')" aria-label="Second Alert Button">
        Button 2
    </button>

    <!-- Button 3 -->
    <button type="button" onclick="alert('Button 3 clicked')" aria-label="Third Alert Button">
        Button 3
    </button>

</body>
</html>
