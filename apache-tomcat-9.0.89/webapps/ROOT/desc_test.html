<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button Navigation</title>
    <style>
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 50px;
      }
      button {
        margin: 10px;
        padding: 10px 20px;
      }
      .selected {
        background-color: lightblue;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <button id="button2">Button 3</button>
    </div>
    <div
      class="container"
      class="selected"
      id="button1"
      role="button"
      aria-description=""
      aria-label=" 링크 "
    >
      <div
        id="mainframe.QuickViewFrame.form.Button00:icontext"
        class="nexacontentsbox"
      >
        주거급여소개
      </div>
    </div>
    <div class="container">
      <button
        id="button2"
        role="button"
        aria-label=" 주거급여소개 링크 "
        text="주거급여소개"
      >
        Button 2
      </button>
    </div>

    <script>
      let buttons = document.querySelectorAll("button")
      let selectedIndex = 0

      document.addEventListener("keydown", (event) => {
        if (event.key === "ArrowUp") {
          selectedIndex =
            selectedIndex > 0 ? selectedIndex - 1 : buttons.length - 1
        } else if (event.key === "ArrowDown") {
          selectedIndex =
            selectedIndex < buttons.length - 1 ? selectedIndex + 1 : 0
        }

        buttons.forEach((button, index) => {
          button.classList.toggle("selected", index === selectedIndex)
        })
      })
    </script>
  </body>
</html>
