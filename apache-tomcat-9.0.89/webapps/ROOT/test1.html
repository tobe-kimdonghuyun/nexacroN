<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테스트 페이지</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        button {
            background: #ffffff;
            color: #764ba2;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            background: #f0f0f0;
        }
        button:active {
            transform: translateY(-1px);
        }
        #result {
            margin-top: 20px;
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            min-height: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>객체 복사 테스트</h1>
        <button id="execBtn">테스트 실행</button>
        <div id="result">버튼을 클릭하세요 (결과는 콘솔에도 출력됩니다)</div>
    </div>

    <script>
        document.getElementById('execBtn').addEventListener('click', () => {
            const test1 = {a: 1, b: 2};
            const test2 = {...test1};
            
            console.log('test2:', test2);
            document.getElementById('result').innerText = 'test2: ' + JSON.stringify(test2);
            alert('test2 객체가 출력되었습니다. 콘솔을 확인하세요.');
        });
    </script>
</body>
</html>
