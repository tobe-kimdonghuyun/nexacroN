<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      .outer-div {
        width: 300px;
        height: 300px;
        border: 1px solid black;
        padding: 10px;
      }

      .inner-div {
        width: 100%;
        height: 100%;
        border: 1px solid red;
        overflow-y: scroll;
      }
    </style>
    <title>DIV Scrolling Example</title>
  </head>
  <body>
    <div class="outer-div">
      <div class="inner-div">
        <p>첫 번째 줄</p>
        <p>두 번째 줄</p>
        <p>세 번째 줄</p>
        <p>네 번째 줄</p>
        <p>다섯 번째 줄</p>
        <p>여섯 번째 줄</p>
        <p>일곱 번째 줄</p>
        <p>여덟 번째 줄</p>
        <p>아홉 번째 줄</p>
        <p>열 번째 줄</p>
        <p>열한 번째 줄</p>
        <p>열두 번째 줄</p>
      </div>
    </div>
  </body>
</html>
