<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accessible Radio Buttons</title>
  </head>
  <script>
    function fn_test()

    }

  <body>
    <form>
      <input type="button" />S
      <fieldset>
        <legend>좋아하는 색상을 선택하세요: radiogroup</legend>
        <div
          id="mainframe.QuickViewFrame.form.Radio00"
          role="radiogroup"
          aria-live="off"
          aria-description=""
          aria-label="​"
          aria-disabled="false"
          aria-readonly="false"
        >
          <div>
            <input
              type="radio"
              id="colorRed"
              name="favoriteColor"
              value="red"
              aria-describedby="colorRedDescription"
            />
            <label for="colorRed">빨간색</label>
            <span id="colorRedDescription"
              >생동감 있고 열정적인 색상입니다.</span
            >
          </div>
          <div>
            <input
              type="radio"
              id="colorBlue"
              name="favoriteColor"
              value="blue"
              aria-describedby="colorBlueDescription"
            />
            <label for="colorBlue">파란색</label>
            <span id="colorBlueDescription">차분하고 안정적인 색상입니다.</span>
          </div>
          <div>
            <input
              type="radio"
              id="colorGreen"
              name="favoriteColor"
              value="green"
              aria-describedby="colorGreenDescription"
            />
            <label for="colorGreen">초록색</label>
            <span id="colorGreenDescription"
              >자연스럽고 평화로운 색상입니다.</span
            >
          </div>
        </div>
      </fieldset>
