<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주민등록번호 입력 및 유효성 검사</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h2 {
            color: #333;
            margin-bottom: 1.5rem;
        }
        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #666;
            font-size: 0.9rem;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
            letter-spacing: 1px;
        }
        input[type="text"]:focus {
            border-color: #4a90e2;
        }
        input[type="text"].valid {
            border-color: #2ecc71;
            background-color: #f0fff4;
        }
        input[type="text"].invalid {
            border-color: #e74c3c;
            background-color: #fff5f5;
        }
        .message {
            font-size: 0.85rem;
            height: 1.2em;
            margin-top: 0.5rem;
        }
        .message.valid {
            color: #2ecc71;
        }
        .message.invalid {
            color: #e74c3c;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>주민등록번호 입력</h2>
        <div class="input-group">
            <label for="rrnInput">주민등록번호 (하이픈 자동 입력)</label>
            <input type="text" id="rrnInput" maxlength="14" placeholder="앞 6자리 - 뒤 7자리">
            <div id="validationMessage" class="message"></div>
        </div>
    </div>

    <script>
        const rrnInput = document.getElementById('rrnInput');
        const validationMessage = document.getElementById('validationMessage');

        // 정규식 패턴: 6자리 숫자 - (1~4로 시작하는) 7자리 숫자
        // 간단한 형식 검사이며, 실제 유효성 검증(체크섬 등)은 제외됨
        const rrnRegex = /^\d{6}-[1-4]\d{6}$/;

        rrnInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/[^0-9]/g, ''); // 숫자만 추출
            
            // 하이픈 자동 삽입
            if (value.length > 6) {
                value = value.substring(0, 6) + '-' + value.substring(6);
            }

            e.target.value = value;
            validate(value);
        });

        function validate(value) {
            if (value.length === 0) {
                setNormalState();
                return;
            }

            if (rrnRegex.test(value)) {
                setValidState('유효한 주민등록번호 형식입니다.');
            } else {
                if (value.length === 14) {
                    setInvalidState('형식이 올바르지 않습니다.');
                } else {
                    setNormalState(); // 입력 중일 때는 에러 메시지 숨김
                }
            }
        }

        function setValidState(msg) {
            rrnInput.classList.remove('invalid');
            rrnInput.classList.add('valid');
            validationMessage.textContent = msg;
            validationMessage.className = 'message valid';
        }

        function setInvalidState(msg) {
            rrnInput.classList.remove('valid');
            rrnInput.classList.add('invalid');
            validationMessage.textContent = msg;
            validationMessage.className = 'message invalid';
        }

        function setNormalState() {
            rrnInput.classList.remove('valid', 'invalid');
            validationMessage.textContent = '';
            validationMessage.className = 'message';
        }
    </script>
</body>
</html>
