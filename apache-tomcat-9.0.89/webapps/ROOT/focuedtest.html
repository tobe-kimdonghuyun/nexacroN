<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus & Blur with ARIA</title>
    <style>
        .box {
            width: 150px;
            height: 100px;
            margin: 10px;
            display: inline-block;
            background-color: lightgray;
            text-align: center;
            line-height: 100px;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .focused {
            background-color: lightblue;
            border: 2px solid blue;
        }
    </style>
</head>
<body>

    <div class="box" tabindex="0" aria-selected="false">Box 1</div>
    <div class="box" tabindex="0" aria-selected="false">Box 2</div>
    <div class="box" tabindex="0" aria-selected="false">Box 3</div>

    <script>
        // 모든 div 요소 가져오기
        const boxes = document.querySelectorAll(".box");

        boxes.forEach(box => {
            // Focus 이벤트 (클릭하거나 Tab키로 선택했을 때)
            box.addEventListener("focus", () => {
                box.classList.add("focused");
                box.setAttribute("aria-selected", "true");
            });

            // Blur 이벤트 (다른 곳을 클릭했을 때)
            box.addEventListener("blur", () => {
                box.classList.remove("focused");
                box.setAttribute("aria-selected", "false");
            });
        });
    </script>

</body>
</html>
