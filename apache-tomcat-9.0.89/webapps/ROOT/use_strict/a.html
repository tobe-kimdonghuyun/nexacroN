<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>A Page</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f1f8e9;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h3 { color: #388e3c; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #c8e6c9;
            color: #2e7d32;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary { background-color: #4caf50; color: white; }
        .btn-secondary { background-color: #81c784; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h3>A 페이지 (테이블 및 버튼)</h3>
        <table>
            <thead>
                <tr>
                    <th>항목</th>
                    <th>내용</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>데이터 1</td>
                    <td>상세 내용 A</td>
                </tr>
                <tr>
                    <td>데이터 2</td>
                    <td>상세 내용 B</td>
                </tr>
            </tbody>
        </table>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="fn_btn1_onclick()">기능 버튼 1</button>
            <button class="btn btn-secondary" onclick="fn_btn2_onclick()">기능 버튼 2</button>
        </div>
    </div>

    <script>
        function fn_btn1_onclick() {
            a = "123"
            alert('A 페이지: 기능 버튼 1이 클릭되었습니다.');
            console.log('Button 1 Clicked in A Page');
        }

        function fn_btn2_onclick() {
            alert('A 페이지: 기능 버튼 2가 클릭되었습니다.');
            console.log('Button 2 Clicked in A Page');
        }
    </script>
</body>
</html>
