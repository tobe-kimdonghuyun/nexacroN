<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test</title>
  </head>
  <script>
    function fn_click()
    {
        document.getElementById("avatar").click();
    }
  </script>
  <body onload="">
    <label for="avatar">Choose a profile picture:</label>

    <input
      type="file"
      id="avatar"
      name="avatar"
      accept="1N  image/png, image/jpeg"
      multiple
    /></br>
    <input type="button" onclick="fn_click()" value="file click"/>
  </body>
</html>
