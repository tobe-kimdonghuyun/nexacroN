<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="dropArea"
        style="width: 300px; height: 150px; border: 2px dashed #000; text-align: center; line-height: 150px;">
        Drag & Drop Files or Folders Here
    </div>
    
    <!-- нҠёлҰ¬ кө¬мЎ°к°Җ н‘ңмӢңлҗ  мҳҒм—ӯ -->
    <div id="fileTree"></div>
    
    <!-- м—…лЎңл“ң лІ„нҠј -->
    <button id="uploadBtn" disabled>Upload Files</button>

    <div id="output"></div>
    
    <script type="text/javascript">
        const dropArea = document.getElementById('dropArea');
        const fileTree = document.getElementById('fileTree');
        const uploadBtn = document.getElementById('uploadBtn');
        const output = document.getElementById('output');

        let filesToUpload = [];  // м—…лЎңл“ңн•  нҢҢмқјмқ„ м ҖмһҘн•  л°°м—ҙ

        // л“ңлһҳк·ё м•Ө л“ңлЎӯ кё°ліё лҸҷмһ‘ л°©м§Җ
        dropArea.addEventListener('dragover', (event) => {
            event.preventDefault();
            dropArea.style.backgroundColor = '#e0e0e0';
        });

        dropArea.addEventListener('dragleave', () => {
            dropArea.style.backgroundColor = '';
        });

        dropArea.addEventListener('drop', (event) => {
            event.preventDefault();
            dropArea.style.backgroundColor = '';

            const items = event.dataTransfer.items;
            fileTree.innerHTML = '';  // кё°мЎҙ нҠёлҰ¬ мҙҲкё°нҷ”
            filesToUpload = [];  // нҢҢмқј л°°м—ҙ мҙҲкё°нҷ”

            for (let i = 0; i < items.length; i++) {
                const item = items[i].webkitGetAsEntry();
                if (item) {
                    if (item.isFile) {
                        item.file((file) => {
                            addFileToTree(file, null, '');
                            uploadBtn.disabled = false;
                        });
                    } else if (item.isDirectory) {
                        readDirectory(item, null, item.name);
                    }
                }
            }

            if (filesToUpload.length === 0) {
                uploadBtn.disabled = true;
            }
        });

        // нҸҙлҚ” лӮҙл¶Җ нҢҢмқјмқ„ мһ¬к·Җм ҒмңјлЎң мқҪкё° (мғҒлҢҖ кІҪлЎң мң м§Җ)
        function readDirectory(directoryEntry, parentElement, path) {
            const dirReader = directoryEntry.createReader();
            const dirElement = createTreeElement(directoryEntry.name, true);

            if (parentElement) {
                parentElement.appendChild(dirElement);
            } else {
                fileTree.appendChild(dirElement);
            }

            dirReader.readEntries((entries) => {
                entries.forEach((entry) => {
                    const fullPath = `${path}/${entry.name}`;
                    if (entry.isFile) {
                        entry.file((file) => {
                            addFileToTree(file, dirElement, fullPath);
                            uploadBtn.disabled = false;
                        });
                    } else if (entry.isDirectory) {
                        readDirectory(entry, dirElement, fullPath);  // нҸҙлҚ” лӮҙл¶Җмқҳ лҳҗ лӢӨлҘё нҸҙлҚ”
                    }
                });
            });
        }

        // нҢҢмқј нҠёлҰ¬м—җ нҢҢмқј м¶”к°Җ л°Ҹ кІҪлЎң м¶”м Ғ
        function addFileToTree(file, parentElement, path) {
            const fileElement = createTreeElement(file.name, false);

            if (parentElement) {
                parentElement.appendChild(fileElement);
            } else {
                fileTree.appendChild(fileElement);
            }

            filesToUpload.push({ file, path });  // м—…лЎңл“ңн•  нҢҢмқјкіј кІҪлЎңлҘј н•Ёк»ҳ м ҖмһҘ
        }

        // нҠёлҰ¬ кө¬мЎ°мқҳ HTML мҡ”мҶҢ мғқм„ұ
        function createTreeElement(name, isDirectory) {
            const element = document.createElement('div');
            element.style.marginLeft = '20px';
            element.textContent = isDirectory ? `рҹ“Ғ ${name}` : `рҹ“„ ${name}`;
            return element;
        }

        // нҢҢмқј м—…лЎңл“ң мІҳлҰ¬
        uploadBtn.addEventListener('click', () => {
            const formData = new FormData();

            console.log(filesToUpload)

            // лӘЁл“  нҢҢмқјмқ„ formDataм—җ м¶”к°Җ (нҢҢмқјкіј кІҪлЎңлҘј н•Ёк»ҳ м „мҶЎ)
            filesToUpload.forEach(({ file, path }) => {
                formData.append('files', file, path);  // кІҪлЎңлҘј нҸ¬н•Ён•ҙ м „мҶЎ
            });

            fetch('/upload', {
                method: 'POST',
                body: formData,
            })
                .then(response => response.text())
                .then(result => {
                    output.innerHTML += `<p>${result}</p>`;
                    uploadBtn.disabled = true;  // м—…лЎңл“ң нӣ„ лІ„нҠј л№„нҷңм„ұнҷ”
                })
                .catch(error => {
                    console.error('Error uploading files:', error);
                });
        });


    </script>
</body>
</html>
