<!DOCTYPE html>
<html>
  <head>
    <title></title>
    <link
      href="https://kendo.cdn.telerik.com/themes/10.0.1/default/default-main.css"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

    <script src="https://kendo.cdn.telerik.com/2024.4.1112/js/kendo.all.min.js"></script>
  </head>
  <body>
    <div id="example">
      <div id="grid"></div>

      <script>
        function onChange(arg) {
          kendoConsole.log(
            "The selected product ids are: [" +
              this.selectedKeyNames().join(", ") +
              "]"
          )
        }

        $(document).ready(function () {
          $("#grid").kendoGrid({
            dataSource: {
              pageSize: 10,
              transport: {
                read: {
                  url: "https://demos.telerik.com/kendo-ui/service/Products",
                  dataType: "jsonp",
                },
              },
              schema: {
                model: {
                  id: "ProductID",
                },
              },
            },
            pageable: true,
            scrollable: false,
            persistSelection: false,
            sortable: true,
            change: onChange,
            columns: [
              { selectable: true, width: "50px" },
              { field: "ProductName", title: "Product Name" },
              { field: "UnitPrice", title: "Unit Price", format: "{0:c}" },
              { field: "UnitsInStock", title: "Units In Stock" },
              { field: "Discontinued" },
            ],
          })
        })
      </script>
    </div>

    <div class="kd-example-console">
      <div class="header">
        <span class="title">CONSOLE LOG</span>
        <span class="clear kd-text-secondary">Clear log</span>
      </div>
      <div class="console"></div>
    </div>
  </body>
</html>
