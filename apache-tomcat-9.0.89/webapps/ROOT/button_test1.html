<!DOCTYPE html>
<html lang="ko" >
  <head>
    <title>Dynamic Buttons</title>
    <style>
      button {
        width: 200px;
        height: 100px;
        border: 2px solid black;
        padding: 10px;
        outline: none; /* 기본 포커스 스타일 제거 */
      }

      button:focus {
        border-color: red; /* 포커스가 갔을 때의 border 색상 */
        background-color: brown;
      }
    </style>
    <script type="text/javascript">
      function createButtons() {
        var container = document.getElementById("buttonContainer")
        document.getElementById()

        for (var i = 0; i < 3; i++) {
          var button = document.createElement("button")
          button.textContent = "Button " + (i + 1)
          if (i == 0) {
            button.role = "heading1"
          }
          container.appendChild(button)
          container.appendChild(document.createElement("br"))
        }
      }
    </script>
  </head>
  <body>
    <button onclick="createButtons()">Create Buttons</button>
    <button role="heading1">role heading1</button>
    <div id="buttonContainer" aria-label="​" aria-disabled="false"></div>
    <input id="jpInput" lang="ja" inputmode="kana" placeholder="日本語で入力してください">
    <input lang="en" inputmode="latin" placeholder="영문 입력">

  </body>
</html>
