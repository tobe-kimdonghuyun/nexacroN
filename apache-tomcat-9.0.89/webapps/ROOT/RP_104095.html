<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RP_104095</title>
  <style>
    :root {
      --focus-color: #2563eb;
    }
    button,
    iframe {
      border: 1px solid #ccc;
    }
    button:focus-visible,
    iframe:focus-visible {
      outline: 3px solid var(--focus-color);
      outline-offset: 2px;
      border-color: var(--focus-color);
    }
  </style>

  <script>
    function simulateCtrlAltS(targetElement) {
    if (!targetElement) {
        console.error("이벤트를 발생시킬 대상 요소가 지정되지 않았습니다.");
        return;
    }

    // 1. **keydown** 이벤트 시뮬레이션 (키를 누르는 동작)
    // S 키를 누르면서 Ctrl, Alt 키가 눌려있음을 알립니다.
    const eventDown = new KeyboardEvent('keydown', {
        key: 's',
        code: 'KeyS',
        ctrlKey: true, // Ctrl 키를 누른 상태
        altKey: true,  // Alt 키를 누른 상태
        shiftKey: false,
        bubbles: true,
        cancelable: true
    });

    console.log(`[Event: keydown] Ctrl + Alt + S 이벤트 발생을 시도합니다.`);
    targetElement.dispatchEvent(eventDown);
    // dispatchEvent()는 이벤트 리스너가 preventDefault()를 호출하여 기본 동작을 막았는지 여부를 반환합니다 (true/false).

    // 2. **keyup** 이벤트 시뮬레이션 (키를 떼는 동작)
    // S 키를 떼는 동작. 수정자 키는 일반적으로 keyup에도 포함시켜야 완전한 시뮬레이션이 됩니다.
    const eventUp = new KeyboardEvent('keyup', {
        key: 's',
        code: 'KeyS',
        ctrlKey: true, // Ctrl 키는 여전히 눌려있는 상태로 간주
        altKey: true,  // Alt 키는 여전히 눌려있는 상태로 간주
        shiftKey: false,
        bubbles: true,
        cancelable: true
    });

    console.log(`[Event: keyup] Ctrl + Alt + S 이벤트 발생을 완료합니다.`);
    targetElement.dispatchEvent(eventUp);
  }
  </script>
</head>
<body>
  <button type="button" aria-label="알림 버튼 1" onclick="simulateCtrlAltS(this);">알림 버튼 1</button>
  <iframe src="about:blank" title="내용을 표시할 프레임" style="width: 100%; height: 200px; border: 1px solid #ccc;"></iframe>
  <button type="button" aria-label="알림 버튼 2" onclick="alert('두 번째 버튼을 눌렀습니다.');">알림 버튼 2</button>
  <button type="button" aria-label="알림 버튼 3" onclick="alert('세 번째 버튼을 눌렀습니다.');">알림 버튼 3</button>
</body>
</html>
