<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ARIA Selected Button Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button[role="tab"] {
            padding: 15px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        button[aria-selected="true"] {
            background-color: #2563eb;
            color: white;
            outline: 3px solid #1e40af;
        }
    </style>
</head>
<body>

    <div class="button-group" aria-label="선택 버튼 그룹">
        <button
            aria-selected="false"
            tabindex="1"
            onclick="selectButton(this)">
            버튼 111
        </button>

        <button
            aria-selected="false"
            tabindex="2"
            onclick="selectButton(this)">
            버튼 2222
        </button>
         <button
            aria-selected="true"    

              
            tabindex="2"
            onclick="selectButton(this)">
            버튼 2222
        </button>
    </div>

    <script>
        function selectButton(selectedBtn) {
		
			selectedBtn.setAttribute('aria-selected', 'true');
			alert("Test0");
            const buttons = document.querySelectorAll('aria-label="선택 버튼 그룹"');
			alert("Test");
            buttons.forEach(btn => {
                btn.setAttribute('aria-selected', 'false');
                //btn.setAttribute('tabindex', '-1');
            });

            selectedBtn.setAttribute('aria-selected', 'true');
            //selectedBtn.setAttribute('tabindex', '0');
            selectedBtn.focus();
        }
    </script>

</body>
</html>
