<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading Delay Example</title>
    <style>
      #loading {
        display: none;
        font-size: 2rem;
        color: red;
      }
    </style>
  </head>
  <body>
    <div id="loading">로딩 중입니다. 잠시만 기다려 주세요...</div>
    <div id="content" style="display: none">
      <!-- 여기에 실제 컨텐츠를 작성하세요 -->
      <p>콘텐츠가 로드되었습니다!</p>
    </div>
    <script>
      document.getElementById("loading").style.display = "block"
      setTimeout(function () {
        document.getElementById("loading").style.display = "none"
        document.getElementById("content").style.display = "block"
      }, 30000) // 30000 밀리초 = 30초
    </script>
  </body>
</html>
