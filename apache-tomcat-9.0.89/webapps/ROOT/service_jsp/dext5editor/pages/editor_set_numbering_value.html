<!DOCTYPE html>
<html>
<head>
    <title>Set Numbering</title>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />

    <script type="text/javascript">
        document.write('<scr' + 'ipt src="../config/editor_crossdomain_config.js?t=' + (new Date).getTime() + '" type="text/javascript"><\/scr' + 'ipt>');
    </script>

    <script type="text/javascript">
        var DEXTTOP = parent;
        var Dext5LayerFrame = DEXTTOP.DEXTDOC.getElementById("dext_frame_" + DEXTTOP.G_CURREDITOR.ID);
        if (DEXTTOP.G_CURREDITOR.dialogWindow != null) {
            DEXTTOP = Dext5LayerFrame.contentWindow.DEXTTOP;
        }
        var Dext5LayerWin = Dext5LayerFrame.contentWindow;

        document.write('<link href="' + Dext5LayerWin._dext_editor._config.popupCssUrl + '?t=' + DEXTTOP.DEXT5.UrlStamp + '" rel="stylesheet" type="text/css" />');
        if (Dext5LayerWin._dext_editor._config.customCssUrlDetailApply == "1") {
            document.write('<link href="' + Dext5LayerWin._dext_editor._config.style.customCssUrl + "?t=" + DEXTTOP.DEXT5.UrlStamp + '" rel="stylesheet" type="text/css" />');
        }
        document.write('<scr' + 'ipt src="' + Dext5LayerWin._dext_editor._config.dialogJSUrl + '?t=' + DEXTTOP.DEXT5.UrlStamp + '" type="text/javascript"><\/scr' + 'ipt>');
    </script>
    <style>
        .mobile .no_a {
            width: 90% !important;
        }

            .mobile .no_a ul {
                display: none !important;
            }

            .mobile .no_a input {
                width: 100% !important;
                box-sizing: border-box;
                height: 20px !important;
            }
    </style>
    <script type="text/javascript">
        function page_loaded_event() {
            var _skin_name = LayerWin._dext_editor._config.style.skinName;
            document.getElementById("dext_dialog_box").className = 'DEXT_fiVe_ED_Popup_Type01 DEXT_fiVe_PUi_' + _skin_name;

            var span_title = document.getElementById('span_title');
            var input_start_number = document.getElementById('input_start_number');
            var ol_preview = document.getElementById('preview');
            var val_up = document.getElementById('val_up');
            var val_down = document.getElementById('val_down');

            var span_ok = document.getElementById('span_ok');
            var span_cancel = document.getElementById('span_cancel');
            var ok_btn = document.getElementById('ok_btn');

            span_title.innerHTML = LayerWin.dext5_lang.set_numbering_value.title;

            span_ok.innerHTML = LayerWin.dext5_lang.set_numbering_value.btn_ok;
            span_ok.parentNode.title = LayerWin.dext5_lang.set_numbering_value.btn_ok;
            span_cancel.innerHTML = LayerWin.dext5_lang.set_numbering_value.btn_cancel;
            span_cancel.parentNode.title = LayerWin.dext5_lang.set_numbering_value.btn_cancel;

            document.title = LayerWin.dext5_lang.set_numbering_value.frame_title;

            var _orderedListObj = DEXTTOP.G_CURREDITOR.orderedListObj;
            ol_preview.style.listStyleType = _orderedListObj.marker;
            input_start_number.value = _orderedListObj.currNum;
            ol_preview.start = _orderedListObj.currNum;

            var click_event_val_plus = (function () { return function (event) { input_start_number.value = ol_preview.start; LayerWin.click_plus_func(input_start_number, null, 1, function () { input_start_number.value = input_start_number.value; ol_preview.start++; _orderedListObj.changeVal++; input_start_number.focus(); }); DEXTTOP.DEXT5.util.stopEvent(event); } })();
            var click_event_val_minus = (function () { return function (event) { switch (input_start_number.value.toString()) { case '0': case '00': return; } input_start_number.value = ol_preview.start; LayerWin.click_minus_func(input_start_number, 0, 1, null, function () { ol_preview.start--; _orderedListObj.changeVal--; input_start_number.value = input_start_number.value; input_start_number.focus(); }); DEXTTOP.DEXT5.util.stopEvent(event); } })();
            var keyup_event_input_row = (function () { return function (event) { input_keyup_func(input_start_number); DEXTTOP.DEXT5.util.stopEvent(event); } })();

            DEXTTOP.DEXT5.util.addEvent(val_up, "click", click_event_val_plus);
            DEXTTOP.DEXT5.util.addEvent(val_down, "click", click_event_val_minus);
            
            DEXTTOP.DEXT5.util.addEvent(input_start_number, "keyup", keyup_event_input_row);
            DEXTTOP.DEXT5.util.addEvent(input_start_number, "keydown", LayerWin.onlyNumber);
            DEXTTOP.DEXT5.util.addEvent(ok_btn, 'click', function () { set_numbering_value_ok(); });

            if (LayerDoc.compatMode == "BackCompat") {
                var inputs = document.getElementsByTagName('input');
                for (var i = 0; i < inputs.length; i++) {
                    if (inputs[i].type == 'text') {
                        inputs[i].style.height = '20px';
                    }
                }
            }
            var header = LayerWin.getElementsByClass('EdiTor_Popup_header', document);
            header[0].onselectstart = function () { return false; };

            setCursorPos(document.getElementById('radio_row'), false, false);
            LayerWin.setFocusFirstAndLast(document, document.getElementById('radio_row'));
        }

        function input_keyup_func(obj) {
            str = obj.value;
            len = str.length;
            ch = str.charAt(0);
            for (i = 0; i < len; i++) {
                ch = str.charAt(i);
                if (!(ch >= '0' && ch <= '9')) {
                    alert('0 이상 ' + LayerWin.dext5_lang.msg.alert_only_number);
                    obj.value = '0';
                    document.getElementById('preview').start = 0;
                    DEXTTOP.G_CURREDITOR.orderedListObj.changeVal = 0;
                    obj.focus();
                    return false;
                } else if (i > 0 && str.charAt(0) == '0') {
                    obj.value = ch;
                    document.getElementById('preview').start = ch;
                    DEXTTOP.G_CURREDITOR.orderedListObj.changeVal = ch;
                    obj.focus();
                    return false;
                }
            }
            if (obj.value == '') {
                obj.value = '0';
                document.getElementById('preview').start = 0;
                DEXTTOP.G_CURREDITOR.orderedListObj.changeVal = 0;
            } else {
                document.getElementById('preview').start = obj.value;
                DEXTTOP.G_CURREDITOR.orderedListObj.changeVal = obj.value;
            }
        }

    </script>
</head>
<body style="margin:0px; padding:0px; " onload="page_loaded_event(); page_dialog_loaded_event();">
    <div class="" id="dext_dialog_box">
        <!-- Header -->
        <div class="EdiTor_Popup_header">
            <span class="subject" id="span_title">번호 매기기 값 설정</span><span class="text">DEXT5 Editor</span>
            <div class="close">
                <a href="javascript:event_dext_close();" title="close"></a>
            </div>
        </div>
        <!-- // Header -->
        <!-- Contents / general -->
        <div class="EdiTor_Popup_contents view">
            <div class="contents">
                <div class="con">
                    <table cellpadding="0" cellspacing="0">
                        <tbody>
                            <tr>
                                <td style="width: 20%;">
                                    <span>시작 번호</span>
                                </td>
                                <td>
                                    <div class="no_a" style="display: inline-block;">
                                        <input id="input_start_number" name="input_start_number" type="text" class="con_input" />
                                        <ul>
                                            <li>
                                                <a href="javascript:void(0)" id="val_up" style="cursor:pointer;">
                                                    <img src="../images/editor/dialog/btn/editor_ta_btn.gif" width="15" height="10" alt="up" />
                                                </a>
                                            </li>
                                            <li>
                                                <a href="javascript:void(0)" id="val_down" style="cursor:pointer;">
                                                    <img src="../images/editor/dialog/btn/editor_ba_btn.gif" width="15" height="10" alt="down" />
                                                </a>
                                            </li>
                                        </ul>
                                    </div>
                                </td>
                                
                            </tr>
                            <tr>
                                <td colspan="2">
                                    <div style="height: 30px;">
                                        <span>미리보기 &nbsp; </span>
                                        <ol id="preview" style="list-style-position: inside; padding-left: 0; display:inline-block;"><li id=""></li></ol>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <!-- // Contents -->
        <!-- Footer -->
        <div class="EdiTor_Popup_footer">
            <a id="ok_btn" class="confirm" href="javascript:void(0);"><span id="span_ok"></span></a> <a href="javascript:event_dext_close();" class="cancel"><span id="span_cancel"></span></a>
        </div>
        <!-- // Footer -->
    </div>
</body>
</html>
