<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Table with Buttons</title>
<style>
  .table-wrapper {
    height: 300px;
    overflow-y: auto;
    overflow-x: hidden;
    border: 1px solid #ccc;
    margin: 8px 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    border: 1px solid #ddd;
    padding: 4px 8px;
    text-align: left;
    white-space: nowrap;
  }

  thead th {
    background: #f5f5f5;
    position: sticky;
    top: 0;
  }

  td a {
    color: #0066cc;
    text-decoration: none;
  }

  td a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<!-- 앞 버튼 -->
<button type="button">이전</button>

<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th>링크</th>
        <th>내용</th>
      </tr>
    </thead>
    <tbody>
      <tr><td><a href="#">항목 1</a></td><td><button>데이터 1</button></td></tr>
      <tr><td><a href="#">항목 2</a></td><td><button>데이터 2</button></td></tr>
      <tr><td><a href="#">항목 3</a></td><td><button>데이터 3</button></td></tr>
      <tr><td><a href="#">항목 4</a></td><td><button>데이터 4</button></td></tr>
      <tr><td><a href="#">항목 5</a></td><td><button>데이터 5</button></td></tr>
      <tr><td><a href="#">항목 6</a></td><td><button>데이터 6</button></td></tr>
      <tr><td><a href="#">항목 7</a></td><td><button>데이터 7</button></td></tr>
      <tr><td><a href="#">항목 8</a></td><td><button>데이터 8</button></td></tr>
      <tr><td><a href="#">항목 9</a></td><td><button>데이터 9</button></td></tr>
      <tr><td><a href="#">항목 10</a></td><td><button>데이터 10</button></td></tr>
      <tr><td><a href="#">항목 11</a></td><td><button>데이터 11</button></td></tr>
      <tr><td><a href="#">항목 12</a></td><td><button>데이터 12</button></td></tr>
      <tr><td><a href="#">항목 13</a></td><td><button>데이터 13</button></td></tr>
      <tr><td><a href="#">항목 14</a></td><td><button>데이터 14</button></td></tr>
      <tr><td><a href="#">항목 15</a></td><td><button>데이터 15</button></td></tr>
      <tr><td><a href="#">항목 16</a></td><td><button>데이터 16</button></td></tr>
      <tr><td><a href="#">항목 17</a></td><td><button>데이터 17</button></td></tr>
      <tr><td><a href="#">항목 18</a></td><td><button>데이터 18</button></td></tr>
      <tr><td><a href="#">항목 19</a></td><td><button>데이터 19</button></td></tr>
      <tr><td><a href="#">항목 20</a></td><td><button>데이터 20</button></td></tr>
    </tbody>
  </table>
</div>

<!-- 뒤 버튼 -->
<button type="button">다음</button>

</body>
</html>
