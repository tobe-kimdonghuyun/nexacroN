function rMateChartAppendJs(url, themeUrl) {
	var oXmlHttp;
	if (window.ActiveXObject) {
		try {
			oXmlHttp = new ActiveXObject("Msxml2.XMLHTTP");
		} catch(e) {
			try {
				oXmlHttp = ActiveXObject("Microsoft.XMLHTTP");
			} catch(e1) {
				alert('XMLHttpRequest create error');
				return;
			}
		}
	} else if (window.XMLHttpRequest) // Gecko
		oXmlHttp = new XMLHttpRequest() ;
	else {
		alert('XMLHttpRequest create error');
		return;
	}

	oXmlHttp.onreadystatechange = function() {
		if (oXmlHttp.readyState == 4) {
			if (oXmlHttp.status == 200 || oXmlHttp.status == 304) {
				IncludeJS("rmateh5js", url, oXmlHttp.responseText);
				//2020.09.21 LGK 6.0ьЭШ ъ▓╜ьЪ░ themeые╝ ыУ▒ыбЭэХШъ╕░ ьЬДэХ┤ьДЬыКФ create ьаДьЧР эХ┤ьХ╝эХйыЛИыЛд.
				rMateChartAppendThemeJs(themeUrl);

				rMateChartH5.dataEditorUrl = dataEditorUrl;
				rMateChartH5.create(rMateChartID, "chartHolder", rMateChartVars, "100%", "100%");
			} else {
				alert("rmateh5js "+ url);
				alert('XML request error: ' + oXmlHttp.statusText + ' (' + oXmlHttp.status + ')');
			}
		}
	}
	oXmlHttp.open('GET', url, false);
	oXmlHttp.send(null);
}

function IncludeJS(sId, fileUrl, source) {
	if ((source != null) && (!document.getElementById( sId ))) {
		var oHead = document.getElementsByTagName('HEAD').item(0);
		var oScript = document.createElement("script");
		oScript.language = "javascript";
		oScript.type = "text/javascript";
		oScript.id = sId;
		oScript.defer = true;
		oScript.text = source;
		oHead.appendChild(oScript);
	}
}

var rMateInvokeID = 0;
function nexacroCallMethod(funcName) {
	var param = "";
	var ret;
	var hr;
	var boundArgs = arguments;

	param = "<invoke name=\"" + funcName + "\" returntype=\"xml\">";
	if (boundArgs.length <= 1)
		param += "<arguments></arguments></invoke>";
	else {
		param += "<arguments>";
		for (var i = 1; i < boundArgs.length; i++) {
			param += rMateChartEncodeXML(boundArgs[i]);
		}
		param += "</arguments></invoke>";
	}
	document.frmRead.invokeData.value = param;
	invokeData = document.frmRead.invokeData.value;
	
	rMateInvokeID++;
	var pp = window.NEXACROWEBBROWSER;
	if (pp) {
		// Web Browser, iOS nexacro Browser, Android Default Web Browser, iOS Default WebBrowser 
		pp.on_fire_onusernotify(pp, "invoked" + rMateInvokeID);
	} else if(typeof nexacro == "undefined"){
		 // Windows nexacro Browser 
		window.document.title = "invoked" + rMateInvokeID;
	}else{
		// Android nexacro Browser, macOS nexacro Browser 
		nexacro.fireUserNotify("invoked" + rMateInvokeID + "&" + param);
	}
}

function rMateChartEncodeXML(value) {
	var xstr;
	if (value == null)
		return "<null/>";

	switch(typeof(value)) {
		case "number" :
			return "<number>" + value + "</number>";
		case "string" :
			return "<string>"+ escape(value) + "</string>";
		case "boolean" :
			if (value)
				return "<true/>";
			else
				return "<false/>";
		case "object" :
			if (value.length) {	// for array
				xstr = "<array>";
				for (var iii = 0; iii < value.length; iii++) {
					xstr += "<property id=\"" + iii + "\">";
					xstr += rMateChartEncodeXML(value[iii]);
					xstr += "</property>";
				}
				xstr += "</array>";
			} else {
				xstr = "<object>";
				for(var propName in value) {
					xstr += "<property id=\"" + propName + "\">";
					xstr += rMateChartEncodeXML(value[propName]);
					xstr += "</property>";
				}
				xstr += "</object>";
			}
			return xstr;
		default :
			alert("rMateChartEncodeXML unknown type:"+typeof(value));
			return "<undefined/>";
	}
	return "<undefined/>";
}

var totalCount = 0;

var tId = "";
var tCount = 0;
function axisLabelFuncQC(id, value) {
	// HTML5 ыкиыУЬьЭ╝ ъ▓╜ьЪ░ FormьЭШ эХиьИШые╝ ьЛдэЦЙ
	var pp = window.NEXACROWEBBROWSER;
	
	if (pp) {
		return pp.parent.axisLabelFuncQC(id, value);
	}
	
	if (tId != id) {
		tCount = 0;
		tId = id;
	}
	tCount++;
	
	var cCount = (tCount % 9);
	
	if (cCount == 0 || cCount == 1) return "";
	if (cCount == 2) return "-3SD";
	if (cCount == 3) return "-2SD";
	if (cCount == 4) return "-1SD";
	if (cCount == 5) return "Mean";
	if (cCount == 6) return "1SD";
	if (cCount == 7) return "2SD";
	if (cCount == 8) return "3SD";
	
	return "";
	
	var cnt = id.substring(5, id.length);
	var str = gv_arrSd[cnt]+"";
	var sIdx = str.indexOf(".");
	var pCnt = str.length - (sIdx + 1);
	
//	return value;
	
	if (totalCount < 20) {
//		alert("value : "+ value +", val : "+ ((gv_arrMean[cnt]) + (gv_arrSd[cnt] * 3)).toFixed(pCnt) +", sd : "+ gv_arrSd[cnt]);
		totalCount++;
	}
	
	var returnStr = "";
	if (value.toFixed(pCnt) == ((gv_arrMean[cnt]) + (gv_arrSd[cnt] * 3)).toFixed(pCnt)) {
		returnStr = "3SD "+ value.toFixed(pCnt);
	}
	if (value.toFixed(pCnt) == ((gv_arrMean[cnt]) + (gv_arrSd[cnt] * 2)).toFixed(pCnt)) {
		returnStr = "2SD "+ value.toFixed(pCnt);
	}
	if (value.toFixed(pCnt) == ((gv_arrMean[cnt]) + (gv_arrSd[cnt] * 1)).toFixed(pCnt)) {
		returnStr = "1SD "+ value.toFixed(pCnt);
	}
	if (value.toFixed(pCnt) == gv_arrMean[cnt].toFixed(pCnt)) {
		returnStr = "Mean "+ value.toFixed(pCnt);
	}
	if (value.toFixed(pCnt) == ((gv_arrMean[cnt]) - (gv_arrSd[cnt] * 1)).toFixed(pCnt)) {
		returnStr = "-1SD "+ value.toFixed(pCnt);
	}
	if (value.toFixed(pCnt) == ((gv_arrMean[cnt]) - (gv_arrSd[cnt] * 2)).toFixed(pCnt)) {
		returnStr = "-2SD "+ value.toFixed(pCnt);
	}
	if (value.toFixed(pCnt) == ((gv_arrMean[cnt]) - (gv_arrSd[cnt] * 3)).toFixed(pCnt)) {
		returnStr = "-3SD "+ value.toFixed(pCnt);
	}
	return returnStr;
	
//	return gv_arrMean[cnt] +" : "+ gv_arrSd[cnt];
//	return id +":"+ value +"||"+ cnt;
//	return value;
}

function getSum(values) {
	var sum = 0;
	for(var v in values) {
		sum += Number(values[v]) || 0;
	}
	return sum;
}

function fillJsFunc(seriesId, index, data, values) {
	// HTML5 ыкиыУЬьЭ╝ ъ▓╜ьЪ░ FormьЭШ эХиьИШые╝ ьЛдэЦЙ
	var pp = window.NEXACROWEBBROWSER;
	if (pp) {
		return pp.parent.fillJsFunc(seriesId, index, data, values);
	}

	// Runtime ыкиыУЬьЭ╝ ъ▓╜ьЪ░ ьЛдэЦЙ
	if (values[1] > 2000)
		return "0xFF3366";
	else if (values[1] > 1000)
		return "0xFFFF33";
	else
		return "0xFF9999";
}
