<html>
	<head>
		<meta charset="utf-8"/>
		<title>Kakao 지도 시작하기</title>
		    <style>

			.map_wrap {
			    position: relative;
			    width: 100%;
			    height:660px;
			    border:0px solid #cccccc;
			    border-radius:4px;
			    font-size:14px;
			    font-family:'Malgun Gothic',dotum,'돋움',sans-serif;
			}

			.title {
			    font-weight: bold;
			    display: block;
			}

			.hAddr {
			    position: static;
			    left: 10px;
			    top: 10px;
			    border-radius: 2px;
			    background: rgba(255, 255, 255, 0.7);
			    z-index: 30;
			}

			#centerAddr {
			    display: block;
			    margin-top: 2px;
			    font-weight: normal;
			}

			.bAddr {
			    position: static;
			    left: 10px;
			    top: 10px;
			    border-radius: 2px;
			    background: rgba(255, 255, 255, 0.7);
			    z-index: 30;
			    padding: 5px;
			    display: inline-block;
			}

			.bAddr hr {
			    margin-top: 15px;
			    margin-bottom: 15px;
			}

			.close {
				position:absolute;
				top: 14px;
				right:17px;
				color:#888;
				width:17px;
				height:17px;
				cursor:pointer;
				z-index:50;
				background:url(./images/close.png) no-repeat 40%;
			}
		
			.bAddrItem {
			    padding-left: 10px;
			    padding-right: 10px;
			    min-height:35px;
			    background-repeat: no-repeat;
			    background-position: 0 -2px;
			}

			.bAddrItem .title,
			.bAddrItem .title a {
			    font-size: 14px;
			    line-height: 25px;
			    color: #000;
			    white-space : nowrap;
			}
			.bAddrItem .title a {
			    text-decoration: none;
			    z-index: 40;
			}

			.bAddrItem .titleSub {
			    font-size: 13px;
			    line-height: 18px;
			    color: #555;
			    white-space : nowrap;
			}

		/** ------------ 검색 ---------------------------------------------------------------------------- */
		.bg_white {background:#fff;}
		#placesList{list-style: none;padding: 0 0 0 5px;}
		#placesList li {list-style: none;}
		#placesList .item {position:relative;border-bottom:1px solid #888;overflow: hidden;cursor: pointer;min-height: 65px;}
		#placesList .item span {display: block;margin-top:4px;}
		#placesList .item .info {text-overflow: ellipsis;overflow: hidden;white-space: nowrap;}
		#placesList .item .info{padding:3px 0px 10px 45px;}
		#placesList .info .title1 {text-overflow: ellipsis;overflow: hidden;white-space: nowrap;font-size:14px}
		#placesList .info .gray {color:#8a8a8a;}
		#placesList .info .jibun {padding-left:30px;background:url(https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/places_jibun.png) no-repeat;}
		#placesList .info .tel {color:#009900;}
		#placesList .item .markerbg {float:left;position:absolute;width:36px; height:37px;margin:10px 0px 0px 0px;background:url(https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_number_blue.png) no-repeat;}
		#placesList .item .marker_1 {background-position: 0 -10px;}
		#placesList .item .marker_2 {background-position: 0 -56px;}
		#placesList .item .marker_3 {background-position: 0 -102px}
		#placesList .item .marker_4 {background-position: 0 -148px;}
		#placesList .item .marker_5 {background-position: 0 -194px;}
		#placesList .item .marker_6 {background-position: 0 -240px;}
		#placesList .item .marker_7 {background-position: 0 -286px;}
		#placesList .item .marker_8 {background-position: 0 -332px;}
		#placesList .item .marker_9 {background-position: 0 -378px;}
		#placesList .item .marker_10 {background-position: 0 -423px;}
		#placesList .item .marker_11 {background-position: 0 -470px;}
		#placesList .item .marker_12 {background-position: 0 -516px;}
		#placesList .item .marker_13 {background-position: 0 -562px;}
		#placesList .item .marker_14 {background-position: 0 -608px;}
		#placesList .item .marker_15 {background-position: 0 -654px;}
		#pagination {margin:10px auto;text-align: center;}
		#pagination a {display:inline-block;margin-right:10px;font-size:16px;text-decoration: none;}
		#pagination .on {font-weight: bold; cursor: pointer;color:#777;}
		
		</style>
	</head>
	<body>
		<div class="map_wrap">
		
			  <!-- 지도 -->
			   <div id="map" style="position:relative;width:100%;height:100%;"></div>
			   
			  <!-- 검색 -->
			    <div id="search_wrap" class="bg_white" style="vertical-align:middle;text-align:center;display:none;position:absolute;top:0;left:0;height:35px;width:270px;margin:10px 0px 0px 5px;padding:1px;background:rgba(255, 255, 255, 0.7); z-index: 1;border-top-left-radius: 10px;border-top-right-radius: 10px;border-bottom:2px solid #7B4D3F;">
				<form onsubmit="searchPlaces(); return false;">
					<input type="text" value="" id="keyword" style="border: 1px solid #BDBDBD;border-radius: 4px;height:30px; line-height:30px; width:150px;padding:0 8px;margin:0;outline:none;"/>
					<button type="submit" id="btnSubmit" style="border: 1px solid #BDBDBD;border-radius: 4px;height:30px; line-height:30px; width:70px;padding:0 8px;margin:0;cursor:pointer;">조회</button>
				</form>
			  </div>
			  
			<!-- 검색 결과 -->
			<div id="menu_wrap" class="bg_white" style="display:none;position:absolute;top:50;left:0;bottom:0;width:270px;margin:0px 0px 33px 5px;padding:1px;overflow-y:auto;background:rgba(255, 255, 255, 0.7);z-index: 1;border-bottom-left-radius: 10px;border-bottom-right-radius: 10px;">
				<ul id="placesList"></ul>
				<div id="pagination"></div>
			</div>
		</div>

		<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=c807f7ce375c91c9c705837483b1b27d&libraries=services"></script>
		<script>
		
// --  맵 좌표 확인 --------------------------------------------------------------------------------------------------------------------------------------------------------------------

			// center : 씨젠의료재단
			var container = document.getElementById('map');
			var options = {
				center: new kakao.maps.LatLng(37.5643760677938, 127.05512766029015),
				level: 4
			};
			var map = new kakao.maps.Map(container, options);
			
			// 확대 축소 컨트롤
			var zoomControl = new kakao.maps.ZoomControl();
			map.addControl(zoomControl, kakao.maps.ControlPosition.TOPRIGHT);

			//지도이동
			function fn_setCenter(y, x) {            
				// 이동할 위도 경도 위치를 생성합니다 
				var moveLatLon = new kakao.maps.LatLng(y, x);
				// 지도 중심을 이동 시킵니다
				map.setCenter(moveLatLon);
			 };
			 // 좌표가 있을 경우 위치 표시			-------------------------------------------------------
			 function setMarkerAndInfo(y, x, sMarkerText){
			 
				// 이동할 위도 경도 위치를 생성합니다 
				var moveLatLon = new kakao.maps.LatLng(y, x);
				// 지도 중심을 이동 시킵니다
				map.setCenter(moveLatLon);

				// 마커를 생성하고 지도에 표시합니다
				var marker = new kakao.maps.Marker({
					  map: map
					, position: moveLatLon
				});
				
				// 인포윈도우를 생성합니다
				var infowindow;
				var content = initInfoWindows(sMarkerText);
				if(content !=undefined)
				{
				      infowindow = new kakao.maps.InfoWindow({
						  position : moveLatLon
						, content	: content
				      });

				      // 마커 위에 인포윈도우를 표시합니다. 두번째 파라미터인 marker를 넣어주지 않으면 지도 위에 표시됩니다.
				      infowindow.open(map, marker);	
				}
			 };
			 
			 function initInfoWindows(sMarkerText){
				var content;
				
				if(sMarkerText ==null || sMarkerText ==undefined || sMarkerText =="undefined" || new String(sMarkerText).valueOf() == "undefined")
				{
					return content;
				}
				
				var objMarkerText = JSON.parse(sMarkerText);
				if(objMarkerText.custNm ==undefined || objMarkerText.custNm == "")
				{
					return content;
				}
				
				content = 		    "<div class='bAddr'>";
				content = content +	"<div class='bAddrItem'>";
				content = content +		"<div class='title'>"+objMarkerText.custNm +"</div>";
				content = content +		( objMarkerText.asrtNm !=undefined ? "<div class='titleSub'>"+ objMarkerText.asrtNm +"</div>"  : "" );
				content = content +	"</div>";
				content = content +"</div>";

				return content;
				
			 };

			 // 맵에서 좌표 확인		-------------------------------------------------------
			function loadMapInfo(y, x){ 
				// 센터값
				fn_setCenter(y,x);
			};
			// 주소-좌표 변환 객체를 생성합니다
			var geocoder = new kakao.maps.services.Geocoder();
			// 클릭한 위치에 대한 주소를 표시할 인포윈도우입니다
			var clickInfowindow = new kakao.maps.InfoWindow({zindex:10}); 			
			// 지도를 클릭한 위치에 표출할 마커입니다
			var clickMarker = new kakao.maps.Marker({ 
			    // 지도 중심좌표에 마커를 생성합니다 
			    position: map.getCenter()
			}); 
			
			// 지도에 클릭 이벤트를 등록합니다
			// 지도를 클릭하면 마지막 파라미터로 넘어온 함수를 호출합니다
			kakao.maps.event.addListener(map, 'click', function(mouseEvent) {        

			    searchDetailAddrFromCoords(mouseEvent.latLng, function(result, status) {
			    
				// result
				// [{"road_address":{"address_name":"서울특별시 동대문구 천호대로83길 71-2","region_1depth_name":"서울","region_2depth_name":"동대문구","region_3depth_name":"","road_name":"천호대로83길","underground_yn":"N","main_building_no":"71","sub_building_no":"2","building_name":"","zone_no":"02629"}
				//           ,"address":{"address_name":"서울 동대문구 장안동 426-6","region_1depth_name":"서울","region_2depth_name":"동대문구","region_3depth_name":"장안동","mountain_yn":"N","main_address_no":"426","sub_address_no":"6","zip_code":""}}]
				if (status === kakao.maps.services.Status.OK) {

				    // 마커를 클릭한 위치에 표시합니다 				     
				    var latlng = mouseEvent.latLng;
				    clickMarker.setPosition(latlng);
				    clickMarker.setMap(map);

				    //  넥사 이벤트 처리
				    // 지번만 데이타가 반환되는 경우가 있으나 지번의 우편번호가 없을 수도 있음
				    var zipCode 		= !!result[0].road_address ? result[0].road_address.zone_no 		: result[0].address.zip_code;
				    var address 		= !!result[0].road_address ? result[0].road_address.address_name 	: result[0].address.address_name;
				    var extraRoadAddr = "";
				    if(!!result[0].road_address && result[0].road_address.bname !== '' && /[동|로|가]$/g.test(result[0].road_address.bname)){
					extraRoadAddr += result[0].road_address.bname;
				     }
				    var buildingName	= !!result[0].road_address ? result[0].road_address.building_name	: "";
				    if(buildingName !== ""){
					extraRoadAddr += (extraRoadAddr !== '' ? ', ' + buildingName : buildingName);
				    }
				    if(extraRoadAddr !== ""){
					extraRoadAddr = ' (' + extraRoadAddr + ')';
				    }
				    
				    var info = JSON.stringify({
				                               "svcId"	: "info"
							     , "y" 		: latlng.getLat()
							     , "x" 		: latlng.getLng()
							     , "zipCode"	: zipCode
							     , "address"	: (!!result[0].road_address ? address+extraRoadAddr : address)
							     , "addr"	: JSON.stringify(result)
				    });
				    nexacro.fireUserNotify(info);

				    // 인포윈도우에 클릭한 위치에 대한 법정동 상세 주소정보를 표시합니다.
					var content = fn_getInfowindowContent(zipCode
												  , (!!result[0].road_address ? address+extraRoadAddr : address)
												  , (!!result[0].road_address ? result[0].address.address_name : "")
												  ,  latlng.getLng()
												  , latlng.getLat()
												  );
					clickInfowindow.setContent(content);
					clickInfowindow.open(map, clickMarker);
					
					//searchInfowindow.close();		// 검색의 infowindow
					fn_closeSearchInfowindow();

				}   
			    });  // end searchDetailAddrFromCoords

			}); // end Listener
			

			// 중심 좌표나 확대 수준이 변경됐을 때 지도 중심 좌표에 대한 주소 정보를 표시하도록 이벤트를 등록합니다
			kakao.maps.event.addListener(map, 'idle', function() {
			    searchAddrFromCoords(map.getCenter(), displayCenterInfo);
			});

			function searchAddrFromCoords(coords, callback) {
			    // 좌표로 행정동 주소 정보를 요청합니다
			    geocoder.coord2RegionCode(coords.getLng(), coords.getLat(), callback);         
			};

			function searchDetailAddrFromCoords(coords, callback) {
			    // 좌표로 법정동 상세 주소 정보를 요청합니다
			    geocoder.coord2Address(coords.getLng(), coords.getLat(), callback);
			};

			// 지도 좌측상단에 지도 중심좌표에 대한 주소정보를 표출하는 함수입니다
			function displayCenterInfo(result, status) {
			    if (status === kakao.maps.services.Status.OK) {
				var infoDiv = document.getElementById('centerAddr');
				if(infoDiv !=undefined){
					for(var i = 0; i < result.length; i++) {
					    // 행정동의 region_type 값은 'H' 이므로
					    if (result[i].region_type === 'H') {
						infoDiv.innerHTML = result[i].address_name;
						break;
					    }
					}
				}
			    }    
			};	

		function fn_getInfowindowContent(zipCode, road_address , address, pointX, pointY, placeName){
			    // 인포윈도우에 클릭한 위치에 대한 법정동 상세 주소정보를 표시합니다.
			  //var content =               "<div class='bAddr'>";
			  var content =               "<div class=''>";
				content = content +	"<div class='bAddrItem'>";
				
				if(placeName !=undefined && placeName !='undefined'){
					content = content +		"<div class='title'>"+ placeName+"</div>";
					content = content +		"<div class='titleSub'>"+ (!!zipCode ? "("+zipCode+")" : "") +" "+ (!!road_address? road_address : address) +"</div>";
				}else{
					content = content +		"<div class='title'>"+ (!!zipCode ? "("+zipCode+")" : "") +" "+ (!!road_address? road_address : address) +"</div>";
				}
				content = content +		"<div class='titleSub'>"+ (!!road_address? address : "") +"</div>";
				content = content +		"<div class='titleSub'> X : "+ pointX +"</div>" ;
				content = content +		"<div class='titleSub'> Y : "+ pointY +"</div>";
				content = content +	"</div>";
				content = content +"</div>";
			return content;
		};
		
		

// --  검색하기 --------------------------------------------------------------------------------------------------------------------------------------------------------------------
		// 검색영역 처리
		function fn_searchDisplay(bUseSearch){
			if(bUseSearch !=undefined && bUseSearch =='true'){
				document.getElementById('search_wrap').style.display ="block";
				document.getElementById('menu_wrap').style.display ="block";
			}else{
				document.getElementById('search_wrap').style.display ="none";
				document.getElementById('menu_wrap').style.display ="none";
			} 
		};

		// 마커를 담을 배열입니다
		var markers = [];
		// 장소 검색 객체를 생성합니다
		var ps = new kakao.maps.services.Places(); 
		// 검색 결과 목록이나 마커를 클릭했을 때 장소명을 표출할 인포윈도우를 생성합니다
		var searchInfowindow = new kakao.maps.InfoWindow({zIndex:1});
		// 키워드 검색을 요청하는 함수입니다
		function searchPlaces() {
		    var keyword = document.getElementById('keyword').value;
		    if (!keyword.replace(/^\s+|\s+$/g, '')) {
			//alert('키워드를 입력해주세요!');
			var info = JSON.stringify({"svcId": "message", "messageId":"00142"});
			nexacro.fireUserNotify(info);
			return false;
		    }
		    
		    clickMarker.setMap(null); 
		    clickInfowindow.close(); 
		    //searchInfowindow.close();
		    fn_closeSearchInfowindow();
		    
		    // 장소검색 객체를 통해 키워드로 장소검색을 요청합니다
		    ps.keywordSearch( keyword, placesSearchCB); 
		};
		
		// 장소검색이 완료됐을 때 호출되는 콜백함수 입니다
		function placesSearchCB(data, status, pagination) {
		    if (status === kakao.maps.services.Status.OK) {

			// 정상적으로 검색이 완료됐으면
			// 검색 목록과 마커를 표출합니다
			displayPlaces(data);
			
		   // debug
//		    var info = JSON.stringify({
//					       "svcId"	: "places"
//					     , "data"	: JSON.stringify(data)
//		    });
//		    nexacro.fireUserNotify(info);
		    // -----------------------------------------------------------------

			// 페이지 번호를 표출합니다
			displayPagination(pagination);

		    } else if (status === kakao.maps.services.Status.ZERO_RESULT) {

			//alert('검색 결과가 존재하지 않습니다.');
			var info = JSON.stringify({"svcId": "message", "messageId":"00012"});
			nexacro.fireUserNotify(info);			
			return;

		    } else if (status === kakao.maps.services.Status.ERROR) {

			//alert('검색 결과 중 오류가 발생했습니다.');
			var info = JSON.stringify({"svcId": "message", "messageId":"02056"});
			nexacro.fireUserNotify(info);
			return;
		    }
		};
		
		// 검색 결과 목록과 마커를 표출하는 함수입니다
		function displayPlaces(places) {

		    var listEl = document.getElementById('placesList'), 
		    menuEl = document.getElementById('menu_wrap'),
		    fragment = document.createDocumentFragment(), 
		    bounds = new kakao.maps.LatLngBounds(), 
		    listStr = '';
		    
		    // 검색 결과 목록에 추가된 항목들을 제거합니다
		    removeAllChildNods(listEl);

		    // 지도에 표시되고 있는 마커를 제거합니다
		    removeMarker();
		    
		    for ( var i=0; i<places.length; i++ ) {

		   // debug
//		    var info = JSON.stringify({
//					       "svcId"	: "place"
//					     , "data"	: JSON.stringify(places[i])
//		    });
//		    nexacro.fireUserNotify(info);
                    // -----------------------------------------------------------------

			// 마커를 생성하고 지도에 표시합니다
			var placePosition = new kakao.maps.LatLng(places[i].y, places[i].x),
			    marker = addMarker(placePosition, i), 
			    itemEl = getListItem(i, places[i]); // 검색 결과 항목 Element를 생성합니다

			// 검색된 장소 위치를 기준으로 지도 범위를 재설정하기위해
			// LatLngBounds 객체에 좌표를 추가합니다
			bounds.extend(placePosition);

			(function(marker, place) {
			
			    //kakao.maps.event.addListener(marker, 'mouseover', function() {
			    kakao.maps.event.addListener(marker, 'click', function() {
				clickMarker.setMap(null);
				clickInfowindow.close();
				//searchInfowindow.close();
				fn_closeSearchInfowindow();
				displayInfowindow(marker, place);
			    });

			  //  kakao.maps.event.addListener(marker, 'mouseout', function() {
			//	searchInfowindow.close();
			  //  });

			  //itemEl.onmouseover =  function () {
			  itemEl.onclick =  function () {
				fn_setCenter(place.y,  place.x);
				map.setLevel(5);
				
				clickMarker.setMap(null);
			        clickInfowindow.close();
			        //searchInfowindow.close();
				fn_closeSearchInfowindow();
				displayInfowindow(marker, place);
			  };

			   // itemEl.onmouseout =  function () {
			//	searchInfowindow.close();
			  //  };
			  
			//})(marker, places[i].place_name);
			})(marker, places[i]);

			fragment.appendChild(itemEl);
		    }

		    // 검색결과 항목들을 검색결과 목록 Element에 추가합니다
		    listEl.appendChild(fragment);
		    menuEl.scrollTop = 0;

		    // 검색된 장소 위치를 기준으로 지도 범위를 재설정합니다
		    map.setBounds(bounds);
		};

		// 검색결과 항목을 Element로 반환하는 함수입니다
		function getListItem(index, places) {

		    var el = document.createElement('li'),
		    itemStr = '<span class="markerbg marker_' + (index+1) + '"></span>'
				+ '<div class="info">'
				+ '   <span class="title title1">' + places.place_name + '</span>';
		    if (places.road_address_name) {
			itemStr += '    <span>' + places.road_address_name + '</span>' 
				      + '   <span class="jibun gray">' +  places.address_name  + '</span>';
		    } else {
			itemStr += '    <span>' +  places.address_name  + '</span>'; 
		    }
				 
		      //itemStr += '  <span class="tel">' + places.phone  + '</span>';
		      //itemStr += '  <span class="tel">' + places.x  + '</span>';
		      //itemStr += '  <span class="tel">' + places.y  + '</span>';
		      itemStr +='</div>';           // end div info

		    el.innerHTML  = itemStr;
		    el.className = 'item';

		    return el;
		};

		// 마커를 생성하고 지도 위에 마커를 표시하는 함수입니다
		function addMarker(position, idx, title) {
		    var imageSrc = 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_number_blue.png', // 마커 이미지 url, 스프라이트 이미지를 씁니다
			imageSize = new kakao.maps.Size(36, 37),  // 마커 이미지의 크기
			imgOptions =  {
			    spriteSize : new kakao.maps.Size(36, 691), // 스프라이트 이미지의 크기
			    spriteOrigin : new kakao.maps.Point(0, (idx*46)+10), // 스프라이트 이미지 중 사용할 영역의 좌상단 좌표
			    offset: new kakao.maps.Point(13, 37) // 마커 좌표에 일치시킬 이미지 내에서의 좌표
			},
			markerImage = new kakao.maps.MarkerImage(imageSrc, imageSize, imgOptions),
			    marker = new kakao.maps.Marker({
			    position: position, // 마커의 위치
			    image: markerImage 
			});

		    marker.setMap(map); // 지도 위에 마커를 표출합니다
		    markers.push(marker);  // 배열에 생성된 마커를 추가합니다

		    return marker;
		};

		// 지도 위에 표시되고 있는 마커를 모두 제거합니다
		function removeMarker() {
		    for ( var i = 0; i < markers.length; i++ ) {
			markers[i].setMap(null);
		    }   
		    markers = [];
		};

		// 검색결과 목록 하단에 페이지번호를 표시는 함수입니다
		function displayPagination(pagination) {
		    var paginationEl = document.getElementById('pagination'),
			fragment = document.createDocumentFragment(),
			i; 

		    // 기존에 추가된 페이지번호를 삭제합니다
		    while (paginationEl.hasChildNodes()) {
			paginationEl.removeChild (paginationEl.lastChild);
		    }

		    for (i=1; i<=pagination.last; i++) {
			var el = document.createElement('a');
			el.href = "#";
			el.innerHTML = i;

			if (i===pagination.current) {
			    el.className = 'on';
			} else {
			    el.onclick = (function(i) {
				return function() {
				    clickMarker.setMap(null); 
				    clickInfowindow.close();
				    //searchInfowindow.close();
				    fn_closeSearchInfowindow();
				    // 페이지 이동
				    pagination.gotoPage(i);
				}
			    })(i);
			}

			fragment.appendChild(el);
		    }
		    paginationEl.appendChild(fragment);
		};

		// 검색결과 목록 또는 마커를 클릭했을 때 호출되는 함수입니다
		// 인포윈도우에 장소명을 표시합니다
		function displayInfowindow(marker, place) {

		   // debug -----------------------------------------------------------------
//		    var info = JSON.stringify({
//					       "svcId"	: "displayInfowindow"
//					     , "data"	: JSON.stringify(place)
//		    });
//		    nexacro.fireUserNotify(info);
		    // -----------------------------------------------------------------

			searchDetailAddrFromCoords(marker.getPosition(), function(result, status) {

				   // debug -----------------------------------------------------------------
//				    var info = JSON.stringify({
//							       "svcId"	: "searchDetailAddrFromCoords"
//							     , "data"	: JSON.stringify(result)
//				    });
//				    nexacro.fireUserNotify(info);
				    // -----------------------------------------------------------------

				// 검색시 우편번호가 없어서 조회 처리
				var zipCode 		="";
				var extraRoadAddr 	= "";
				if(result !=undefined && result.length > 0 && result[0].road_address !=undefined){
					zipCode = !!result[0].road_address ? result[0].road_address.zone_no : result[0].address.zip_code;
					if(!!result[0].road_address && result[0].road_address.bname !== '' && /[동|로|가]$/g.test(result[0].road_address.bname)){
						extraRoadAddr += result[0].road_address.bname;
					 }
					 var buildingName	= !!result[0].road_address ? result[0].road_address.building_name	: "";
					 if(buildingName !== ""){
						extraRoadAddr += (extraRoadAddr !== '' ? ', ' + buildingName : buildingName);
					 }
					 if(extraRoadAddr !== ""){
						extraRoadAddr = ' (' + extraRoadAddr + ')';
					 }
				 }	

				 // 정보 출력
				  var content = '<div style="padding:5px;z-index:1;">' 
						   + fn_getInfowindowContent(zipCode
											   , (!!place.road_address_name ? place.road_address_name + extraRoadAddr :  place.address_name)
											   , (!!place.road_address_name ? place.address_name :  "") 
											   , place.x
											   , place.y
											   , place.place_name)
						   + '</div>';

				    searchInfowindow.setContent(content);
				    searchInfowindow.open(map, marker);

				   // 정보 callback
				    var info = JSON.stringify({
				                               "svcId"	: "info"
							     , "y" 		: place.y
							     , "x" 		: place.x
							     , "zipCode"	: zipCode
							     , "address"	: (!!place.road_address_name ? place.road_address_name + extraRoadAddr : place.address_name) 
							     , "addr"	: JSON.stringify(place)
				    });
				    nexacro.fireUserNotify(info);
			    });
		};

		 // 검색결과 목록의 자식 Element를 제거하는 함수입니다
		function removeAllChildNods(el) {   
		    while (el.hasChildNodes()) {
			el.removeChild (el.lastChild);
		    }
		}
		
		function fn_closeSearchInfowindow(){
			searchInfowindow.close();
		};

		</script>
