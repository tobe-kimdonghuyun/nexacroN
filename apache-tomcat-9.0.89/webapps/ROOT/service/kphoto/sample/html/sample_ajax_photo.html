    <script type="text/javascript">
        // 생성완료 이벤트
        function RAONKPHOTO_OnCreationComplete(RAONKPhotoID) {
            var logBox = document.getElementById("logBox");
            logBox.innerHTML = 'RAONK Photo 생성 완료 : ' + RAONKPhotoID + '<br/>';
        }

        // 저장 이벤트
        function RAONKPHOTO_OnSaveComplete(RAONKPhotoID, returnObject) {
            var logBox = document.getElementById("logBox");

            logBox.innerHTML += '<br/>' + '저장 완료 : ' + returnObject.src + '<br/>';
        }

        function OpenFileDialog() {
            RAONKPHOTO.OpenFileDialog();
        }

        function loadImgFromUrl() {
            var tempPath = location.href;
            tempPath = tempPath.substring(0, tempPath.lastIndexOf('/'));
            tempPath = tempPath.substring(0, tempPath.lastIndexOf('/'));

            RAONKPHOTO.LoadImgFromUrl(tempPath + '/images/ViewPhotos.jpg');
        }
    </script>
