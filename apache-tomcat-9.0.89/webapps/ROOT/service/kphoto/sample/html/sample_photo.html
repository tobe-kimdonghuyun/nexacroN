<!doctype html>
<html lang="ko">
<head>
    <title>RAONK Upload Sample</title>
    <meta http-equiv="Cache-Control" content="no-cache">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- 샘플 페이지 동작을 위한 파일입니다. -->
    <link href="../css/sample.common.css" rel="stylesheet" />
    <script src="../vender/jquery-1.9.1.min.js" type="text/javascript"></script>
    <script src="../js/sample.common.js" type="text/javascript"></script>
    <!-- 샘플 페이지 동작을 위한 파일입니다. -->

    <script src="../../js/raonkphoto.js" type="text/javascript"></script>

    <script type="text/javascript">
        var G_PhotoID;

        // 생성완료 이벤트
        function RAONKPHOTO_OnCreationComplete(RAONKPhotoID) {
            G_PhotoID = RAONKPhotoID;

            var logBox = document.getElementById("logBox");
            logBox.innerHTML = 'RAONK Photo 생성 완료 : ' + G_PhotoID + '<br/>';
        }

        // 저장 이벤트
        function RAONKPHOTO_OnSaveComplete(RAONKPhotoID, returnObject) {
            G_PhotoID = RAONKPhotoID;

            var logBox = document.getElementById("logBox");

            logBox.innerHTML += '<br/>' + '저장 완료 : ' + returnObject.src + '<br/>';
        }

        function OpenFileDialog() {
            RAONKPHOTO.OpenFileDialog();
        }

        function loadImgFromUrl() {
            var tempPath = location.href;
            tempPath = tempPath.substring(0, tempPath.lastIndexOf('/'));
            tempPath = tempPath.substring(0, tempPath.lastIndexOf('/'));
            
            RAONKPHOTO.LoadImgFromUrl(tempPath + '/images/ViewPhotos.jpg');
        }
    </script>
</head>
<body style="text-align:center;">
    <ul class="info_lst_box">
        <li></li>        
    </ul>
    <div class="btn_lst_box">
        <button type="button" value="파일추가" class="input_image" style="width:120px;" onclick="OpenFileDialog()">로컬 이미지 추가</button>&nbsp;
        <button type="button" value="url 이미지 추가" class="input_image" style="width:120px;" onclick="loadImgFromUrl()">url 이미지 추가</button>&nbsp;
    </div>
    <div style="width: 800px; margin: 0 auto;">
        <script type="text/javascript">
            var raonkParam = {
                Id: 'photo1',
                //InitXml: 'raonkupload.config.xml',
                Width: '800px',
                Height: '600px'//,
                //Lang: 'ko-kr',
                //ToolbarUse: '1',
                //Toolbar: 'open,separator,history,separator,rotate,separator,crop,separator,flip,separator,resize,tone,filter,separator,save',
                //StatusbarUse: '1',
                //ResizeSelectMenuUse: '1',
                //ResizeSelectMenu: '200|w,300|h,400|l,500|w',
                //Filter: 'vintage,blur,grayscale,sepia',
                //PhotoHolder: 'photo_holder',
                //Visibility: 'hidden'
            };

            new RAONKPhoto(raonkParam);

        </script>
    </div>

    <br /><br />

    <!-- 로그영역 -->
    <div id="logBox" class="logBox" style="overflow: auto; height:200px;"></div>
    <!-- //로그영역 -->
</body>
</html>
