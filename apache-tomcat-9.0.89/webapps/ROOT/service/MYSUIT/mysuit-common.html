      // MYSUIT 레포트 호출
      function fn_mysuit_Report(_objParam) {
        if(!window.NEXACROHTML){
          window.NEXACROHTML = {};
        }
        if(window.NEXACROWEBBROWSER) {
        }else if(window.nexacro) {
          var today = new Date();
          var year = today.getFullYear();
          var month = ('0' + (today.getMonth() + 1)).slice(-2);
          var day = ('0' + today.getDate()).slice(-2);
          var hours = ('0' + today.getHours()).slice(-2); 
          var minutes = ('0' + today.getMinutes()).slice(-2);
          var seconds = ('0'  + today.getSeconds()).slice(-2); 
          var date = year + '-' + month  + '-' + day + ' ' + hours + ':' + minutes  + ':' + seconds;
          var txt = "[MYSUIT_LOG] "+ date + "_fn_mysuit_Report call SUCCESS";
          window.nexacro.fireUserNotify(txt);
        } else {
          window.document.title = "onload";
        }
        var objAppData = JSON.parse(decodeURIComponent(_objParam));

        var objFormData = new Object();
        objFormData.projectName = objAppData.projectName;
        objFormData.formName = objAppData.formName;

        var objDataset = new Object();
        objDataset = fn_datasetToJsonString(objAppData.dataset);
        var objParam = new Object();
        objParam = objAppData.param;

        objFormData.datasetList = objDataset;
        objFormData.paramList = objParam;

        if (objAppData.callType == "popup")
          mysuitModule.gfn_reportCall(objFormData, objAppData.url);
        else mysuitModule.gfn_reportCall_self(objFormData, objAppData.url);
      }

      // MYSUIT 멀티 레포트 호출
      function fn_mysuit_Report_multi(_objParam, _objMultiData) {
        if(!window.NEXACROHTML){
          window.NEXACROHTML = {};
        }
        if(window.NEXACROWEBBROWSER) {
        }else if(window.nexacro) {
          var today = new Date();
          var year = today.getFullYear();
          var month = ('0' + (today.getMonth() + 1)).slice(-2);
          var day = ('0' + today.getDate()).slice(-2);
          var hours = ('0' + today.getHours()).slice(-2); 
          var minutes = ('0' + today.getMinutes()).slice(-2);
          var seconds = ('0'  + today.getSeconds()).slice(-2); 
          var date = year + '-' + month  + '-' + day + ' ' + hours + ':' + minutes  + ':' + seconds;
          var txt = "[MYSUIT_LOG] "+ date + "_fn_mysuit_Report_multi call SUCCESS";
          window.nexacro.fireUserNotify(txt);
        } else {
          window.document.title = "onload";
        }
        var arrAppData = JSON.parse(decodeURIComponent(_objParam));
        var arrParamList = new Array();
        var objMultiData = new Object();

        for (var i in arrAppData) {
          var objAppData = arrAppData[i];

          var objFormData = new Object();
          objFormData.projectName = objAppData.projectName;
          objFormData.formName = objAppData.formName;

          var objDataset = new Object();
          objDataset = fn_datasetToJsonString(objAppData.dataset);
          var objParam = new Object();
          objParam = objAppData.param;

          var objParamTotal = new Object();

          for (var dsName in objDataset) {
            objParamTotal[dsName] = objDataset[dsName];
          }

          for (var paramName in objParam) {
            objParamTotal[paramName] = objParam[paramName];
          }
          debugger;
          objFormData.parameter = objParamTotal;
          arrParamList.push(objFormData);
        }
        if (_objMultiData != undefined)
          objMultiData = JSON.parse(decodeURIComponent(_objMultiData));

        objMultiData.UB_FORMLIST_INFO = encodeURIComponent(
          JSON.stringify(arrParamList)
        );

        if (objAppData.callType == "popup")
          mysuitModule.gfn_reportCall(objMultiData, objAppData.url);
        else mysuitModule.gfn_reportCall_self(objMultiData, objAppData.url);
      }

          }

      //LocalExporter callbackFail

          window.NEXACROHTML = {};
        }
        if(window.NEXACROWEBBROWSER) {

        if (typeof nexacro == "undefined") {
          if (window.NEXACROWEBBROWSER) {

              window.NEXACROWEBBROWSER,
              JSON.stringify(_result)
            );
          } else {
            console.log(JSON.stringify(_result));
          }
        } else if (nexacro) {
          nexacro.fireUserNotify(JSON.stringify(_result));
        }

        if (UBLocalExporter.isExeCall(_result)) {
          if (UBLocalExporter.isExeCall(_result)) {
            // localexporter 작동불가 상태인 경우(websocket 통신불가) : true
            console.log("재구동시작");

            //LocalExporter 재구동 함수
            UBLocalExporter.sendeCall(function (_result) {
              console.log("재구동 완료 후 callback");
              console.log(_result);
              if (typeof nexacro == "undefined") {
                if (window.NEXACROWEBBROWSER) {
                  window.NEXACROWEBBROWSER.on_fire_onusernotify(
                    window.NEXACROWEBBROWSER,
                    JSON.stringify(_result)
                  );
                } else {
                  console.log(JSON.stringify(_result));
                }
              } else if (nexacro) {
                nexacro.fireUserNotify(JSON.stringify(_result));
              }
            });
          }
        }
      }

      function fn_datasetToJsonString(_objDataset) {
        var rtnObj = new Object();

        for (key in _objDataset) {
          rtnObj[key] = JSON.stringify(_objDataset[key]);
        }

        return rtnObj;
      }
