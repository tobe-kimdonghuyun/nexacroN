<!DOCTYPE html>
<html>
<head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8" />

<script type="text/javascript">
	function fnSetHtml(sHtml) {
		var element = document.body;
		 element.innerHTML = sHtml;
	};
</script>

<body>
<style>
	@page {size:21cm 29.7cm;margin: 15px}
	@media print{
		header,
		.btn_wrap,
			footer{opacity:0;visibility:hidden;display:none}
		.contents {padding:0}
	}
</style>
<input type="hidden" value="0" id="posStat" />
<!--
<button onclick="moveRight();">오른쪽</button>
<button onclick="moveLeft();">왼쪽</button>
<button onclick="moveUp();">위</button>
<button onclick="moveDown();">아래</button>
<button onclick="rotateR();">회전(우)</button>
<button onclick="rotateL();">회전(좌)</button>
<button onclick="zoomIn2();">확대</button>
<button onclick="zoomOut2();">축소</button>
<button onclick="reverseUpDown();">상하반전</button>
<button onclick="reverseLeftRight();">좌우반전</button>
<br />
-->

<img src="images/clear.jpg?v=2" id="gura"  width="100%" height="100%" border="0px solid" onmousedown="startDrag(event, this)"
     style="position:absolute; left:0px; top:0px; cursor:pointer; cursor:hand" />
<!--<img src="./camera2.JPG" id="gura"  width="100%" height="100%"/>-->
	<!-- onmouseenter="zoomIn(event)" onmouseleave="zoomOut(event)" /> -->

<script>
	var rightLeft = 0;
	let imgRatio = 1;
	var imgDegree = 0;

	var moveRight = function() {
		rightLeft = rightLeft + 100;
		document.querySelector("#gura").style.marginLeft = rightLeft + "px";
	};

	var moveLeft = function() {
		rightLeft = rightLeft - 100;
		document.querySelector("#gura").style.marginLeft = rightLeft + "px";
	};

	var upDown = 0;

	var moveUp = function() {
		upDown = upDown - 100;
		document.querySelector("#gura").style.marginTop = upDown + "px";
	};

	var moveDown = function() {
		upDown = upDown + 100;
		document.querySelector("#gura").style.marginTop = upDown + "px";
	};

	var rotateR = function() {
		imgDegree = imgDegree + 90;
		//console.log("★imgDegree R:" + imgDegree);
		document.querySelector("#gura").style.transform = `scale(${imgRatio}) rotate(${imgDegree}deg)`;
	};
	var rotateL = function() {
		imgDegree = imgDegree - 90;
		//console.log("★imgDegree L:" + imgDegree);
		document.querySelector("#gura").style.transform = `scale(${imgRatio}) rotate(${imgDegree}deg)`;
	};

	function zoomIn(event) {
		event.target.style.transform = "scale(1.5)";
		event.target.style.zIndex = 1;
		event.target.style.transition = "all 0.5s";
	};
	function zoomOut(event) {
		event.target.style.transform = "scale(1)";
		event.target.style.zIndex = 0;
		event.target.style.transition = "all 0.5s";
	};

	const imgBox = document.getElementById('gura');
	var zoomIn2 = function() {
		imgRatio += 0.2;
		imgBox.style.transform = `scale(${imgRatio}) rotate(${imgDegree}deg)`;
		//imgBox.style.transform = `scale(${imgRatio})`;
	};
	var zoomOut2 = function() {
		//const imgBox = document.getElementById('gura');
		imgRatio -= 0.2;
		imgBox.style.transform = `scale(${imgRatio}) rotate(${imgDegree}deg)`;
		//imgBox.style.transform = `scale(${imgRatio})`;
	};

	let isUp = 0;
	let isLeft = 0;
	const reverseUpDown = function() {
		if(isUp === 0) {
			imgBox.style.transform = "scaleY(-1)";
			isUp = 1;
		} else if(isUp === 1) {
			imgBox.style.transform = "scaleY(1)";
			isUp = 0;
		}
	};

	const reverseLeftRight = function() {
		if(isLeft === 0) {
			imgBox.style.transform = "scaleX(-1)";
			isLeft = 1;
		} else if(isLeft === 1) {
			imgBox.style.transform = "scaleX(1)";
			isLeft = 0;
		}
	};

	// 이미지변경
	const imgchange = function(url) {
		//$('gura').attr("src", url);
		const imgBox = document.getElementById('gura');
		imgBox.src = url;
	};

	const imginit = function() {
		const imgBox = document.getElementById('gura');

		if(rightLeft != 0) {
			rightLeft = 0;
			imgBox.style.marginLeft = "0px";
		}

		if(upDown != 0) {
			upDown = 0;
			imgBox.style.marginTop = "0px";
		}

		if(imgRatio != 1 || imgDegree != 0) {
			imgRatio = 1;
			imgDegree = 0;
			imgBox.style.transform = `scale(1) rotate(0deg)`;
		}

		if(isUp != 0) {
			isUp = 0;
			imgBox.style.transform = "scaleY(1)";
		}
		if(isLeft != 0) {
			isLeft = 0;
			imgBox.style.transform = "scaleX(1)";
		}

		if(img_L != 0) {
			img_L = 0;
			imgBox.style.left = "0px";
		}

		if(img_T != 0) {
			img_T = 0;
			imgBox.style.top = "0px";
		}
	};

	// 이미지 프린트
	const imageprint = function() {
		window.print();
	};

	// 초기화
	const reset = function() {
		document.getElementById('gura').src = "./images/clear.jpg?v=2";
	};

	var img_L = 0;
	var img_T = 0;
	var targetObj;

	// 이미지 움직이기
	function moveDrag(e) {
		var e_obj = window.event? window.event : e;
		var dmvx = parseInt(e_obj.clientX + img_L);
		var dmvy = parseInt(e_obj.clientY + img_T);
		targetObj.style.left = dmvx + "px";
		targetObj.style.top = dmvy + "px";
		return false;
	};

	// 드래그 시작
	function startDrag(e, obj) {
		targetObj = obj;
		var e_obj = window.event? window.event : e;
		img_L = getLeft(obj) - e_obj.clientX;
		img_T = getTop(obj) - e_obj.clientY;

		document.onmousemove = moveDrag;
		document.onmouseup = stopDrag;
		if(e_obj.preventDefault)e_obj.preventDefault();
	};

	// 드래그 멈추기
	function stopDrag(e) {
		document.onmousemove = null;
		document.onmouseup = null;

		fnSendToNexacro("onkeyup");
	};

	function getLeft(o) {
		return parseInt(o.style.left.replace('px', ''));
	};
	function getTop(o) {
		return parseInt(o.style.top.replace('px', ''));
	};

	function fnSendToNexacro(userdata) {
		document.getElementById('posStat').value = userdata;
		fn_userNotify(userdata);

		//nexacro.filreUserNotify (userdata);
	};

	function fnImgChange(url) {
		imgchange(url);
	};

	function fnImgChangeWithInit(url) {
		imginit();
		imgchange(url);
	};

	function fnImgInit() {
		imginit();
	};
	
	function fnReset() {
		reset();
	};

	function fnImagePrint() {
		imageprint();
	};
</script>
<style>
	#gura {
		//margin-top: 50px,

	}
</style>
</body>
</html>
