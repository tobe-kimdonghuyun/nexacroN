<html>
	<head>
		<meta charset="utf-8"/>
		<title>Kakao 지도 시작하기</title>
	</head>
	<body>
		<div id="map" style="width:500px;height:400px;"></div>
		<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=c807f7ce375c91c9c705837483b1b27d"></script>
		<script>
			var message = "";
			var container = document.getElementById('map');
			var options = {
				center: new kakao.maps.LatLng(37.5644063396101, 127.055131191391),
				level: 3
			};
			var map = new kakao.maps.Map(container, options);
			
			// 지도를 클릭한 위치에 표출할 마커입니다
			var marker = new kakao.maps.Marker({ 
			}); 
			
			// 지도에 마커를 표시합니다
			marker.setMap(map);
			
			// 지도에 클릭 이벤트를 등록합니다
			// 지도를 클릭하면 마지막 파라미터로 넘어온 함수를 호출합니다
			kakao.maps.event.addListener(map, 'click', function(mouseEvent) {        
			    
			    // 클릭한 위도, 경도 정보를 가져옵니다 
			    var latlng = mouseEvent.latLng; 
			    
			   //마커생성
			   marker = new kakao.maps.Marker({
					title:'클릭마커',
					map: map,
					position: new kakao.maps.LatLng(latlng.getLat(), latlng.getLng()) 
				});
			    // 마커 위치를 클릭한 위치로 옮깁니다
			    marker.setPosition(latlng);
			    
			    //message = '클릭한 위치의 위도는 ' + latlng.getLat() + ' 이고, ';
			    //message += '경도는 ' + latlng.getLng() + ' 입니다';
			    message = latlng.getLat() + "^" + latlng.getLng();
			    //onusernotify 이벤트 실행
			    nexacro.fireUserNotify(message); 
			    
			});
			 //마커표시
			 function setMarker(y, x){

				// 마커를 생성하고 지도에 표시합니다
				marker = new kakao.maps.Marker({
					map: map,
					position: new kakao.maps.LatLng(y, x) 
				});
			  }
			  //다중 마커표시 
			  function initData(stitle, slat, slng){
				//String 데이터 arr로 변경
				var title = stitle.split("^");
				var lat = slat.split("^");
				var lng = slng.split("^");
				
				// 마커를 표시할 위치와 title 객체 배열입니다 
				var positions = [];
				for (var i=0; i<title.length; i++){
					positions.push({
						title: title[i], 
						latlng: new kakao.maps.LatLng(lat[i], lng[i])
					});
				}
				// 마커 이미지의 이미지 주소입니다
				var imageSrc = "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png"; 
				    
				for (var i = 0; i < positions.length; i ++) {
				    
				    // 마커 이미지의 이미지 크기 입니다
				    var imageSize = new kakao.maps.Size(24, 35); 
				    
				    // 마커 이미지를 생성합니다    
				    var markerImage = new kakao.maps.MarkerImage(imageSrc, imageSize); 
				    
				    // 마커를 생성합니다
				    marker = new kakao.maps.Marker({
					map: map, // 마커를 표시할 지도
					position: positions[i].latlng, // 마커를 표시할 위치
					title : positions[i].title, // 마커의 타이틀, 마커에 마우스를 올리면 타이틀이 표시됩니다
					image : markerImage // 마커 이미지 
				    });
				 }
			 }
			  //지도이동
			  function setCenter(y, x) {            
				// 이동할 위도 경도 위치를 생성합니다 
				var moveLatLon = new kakao.maps.LatLng(y, x);
			    
				// 지도 중심을 이동 시킵니다
				map.setCenter(moveLatLon);
			 }
			 //데이터 주고받기
			 function returnData(y, x) {            
				var returnStr = 'Y좌표 :' + y + ' X좌표 :' + x
			    
				return returnStr;
			 }
		</script>
	</body>
</html>
