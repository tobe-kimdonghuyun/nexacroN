<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=c807f7ce375c91c9c705837483b1b27d&libraries=services"></script>
<script>
    //================================필수==============================================
	window.onload = function(){
		execDaumPostcode();
	}
	if (! window.NEXACROHTML) {
		window.NEXACROHTML = {};
	}
	window.NEXACROHTML.FireUserNotify = function(userdata) {
		if (window.NEXACROWEBBROWSER) {
			  window.NEXACROWEBBROWSER.on_fire_onusernotify(window.NEXACROWEBBROWSER, userdata);
		} else {
			  window.document.title = userdata;
		}
	}
	
	//==============================================================================
	function setData(contents) {
		CKEDITOR.instances.editor1.setData(contents);

		//var objEditor = CKEDITOR.instances["editor1"];
		//window.NEXACROHTML.FireUserNotify(objEditor.setData());
	}


	// 테그를 제외한 데이터
	function getData() {
		var objEditor = CKEDITOR.instances["editor1"];
		window.NEXACROHTML.FireUserNotify(objEditor.getData());
	}
	
    var addr = "";
    //본 예제에서는 도로명 주소 표기 방식에 대한 법령에 따라, 내려오는 데이터를 조합하여 올바른 주소를 구성하는 방법을 설명합니다.
    function execDaumPostcode() {
        new daum.Postcode({
            oncomplete: function(data) {
		var geocoder = new kakao.maps.services.Geocoder();
		var callback = function(result, status) {
			if (status === kakao.maps.services.Status.OK) {
				addr = addr + "|" + result[0].y + "|" + result[0].x;
				window.NEXACROHTML.FireUserNotify(addr);
			}else{
				addr = addr + "||";
				window.NEXACROHTML.FireUserNotify(addr);
			}
		};
                // 팝업에서 검색결과 항목을 클릭했을때 실행할 코드를 작성하는 부분.

                // 도로명 주소의 노출 규칙에 따라 주소를 표시한다.
                // 내려오는 변수가 값이 없는 경우엔 공백('')값을 가지므로, 이를 참고하여 분기 한다.
                var roadAddr = data.roadAddress; // 도로명 주소 변수
                var extraRoadAddr = ''; // 참고 항목 변수

                // 법정동명이 있을 경우 추가한다. (법정리는 제외)
                // 법정동의 경우 마지막 문자가 "동/로/가"로 끝난다.
                if(data.bname !== '' && /[동|로|가]$/g.test(data.bname)){
                    extraRoadAddr += data.bname;
                }
                // 건물명이 있고, 공동주택일 경우 추가한다.
                //if(data.buildingName !== '' && data.apartment === 'Y'){
		if(data.buildingName !== ''){
                   extraRoadAddr += (extraRoadAddr !== '' ? ', ' + data.buildingName : data.buildingName);
                }
                // 표시할 참고항목이 있을 경우, 괄호까지 추가한 최종 문자열을 만든다.
                if(extraRoadAddr !== ''){
                    extraRoadAddr = ' (' + extraRoadAddr + ')';
                }
				
		

		if(roadAddr !== ''){
			addr = data.zonecode + "|" + roadAddr + "|" + extraRoadAddr;
			geocoder.addressSearch(roadAddr, callback);
		}
		else {
			addr = data.zonecode + "|" + data.jibunAddress + "|";
			geocoder.addressSearch(data.jibunAddress, callback);
		}
	
            },
            width : '530px',
            height : '450px'
        }).embed();

    }
  
</script>
