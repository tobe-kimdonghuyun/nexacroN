<!-- DOCTYPE : DOCTYPE declaration -->
<!DOCTYPE html>
<html > <!-- LANGUAGE : locale setting (value of location property in Environment) -->
<head>
	<meta http-equiv="X-UA-Compatible" content="IE=Edge">
	<meta charset="UTF-8">
	<meta name="viewport" content="user-scalable=1, initial-scale=0.1, width=device-width, target-densitydpi=device-dpi">
	<!-- META_CHECKVERSION : Add if value of checkversion property in Envrionment is true -->

	
	<!-- FAVICON : favion setting (value of icon property in Environment. add to value of icon property in Environment) -->

	
	<!-- USERFONT_STYLE : userfont style setting (value of userfontid property in Environment. crate contents contained in xfont file specified userfontid property in Environment) -->
    <style id="userfont">
        @font-face {
        	font-family: 'NotoSansKR';
        	font-style: normal;
        	font-weight: 400;
        	src: local('NotoSansKR-VF');
        	src : url(./_resource_/_font_/NotoSansKR-Regular.eot);
        	src : url(./_resource_/_font_/NotoSansKR-Regular.eot?#iefix) format('embedded-opentype'),
                      url(./_resource_/_font_/NotoSansKR-Regular.woff2) format('woff2'),
        	      url(./_resource_/_font_/NotoSansKR-Regular.woff) format('woff');
        }
        @font-face {
        	font-family: 'NotoSansKR';
        	font-style: normal;
        	font-weight: 700;
        	src: local('NotoSansKR-VF');
        	src : url(./_resource_/_font_/NotoSansKR-Bold.eot);
        	src : url(./_resource_/_font_/NotoSansKR-Bold.eot?#iefix) format('embedded-opentype'),
                      url(./_resource_/_font_/NotoSansKR-Bold.woff2) format('woff2'),
        	      url(./_resource_/_font_/NotoSansKR-Bold.woff) format('woff');
        }

        @font-face {
        	font-family: 'Pretendard';
        	font-style: normal;
        	font-weight: 400;
        	src : url(./_resource_/_font_/Pretendard-Regular.ttf) format('truetype');
        	src : url(./_resource_/_font_/Pretendard-Regular.eot);
        	src : url(./_resource_/_font_/Pretendard-Regular.eot?#iefix) format('embedded-opentype'),
                      url(./_resource_/_font_/Pretendard-Regular.woff2) format('woff2'),
        	      url(./_resource_/_font_/Pretendard-Regular.woff) format('woff');
        }
        @font-face {
        	font-family: 'Pretendard';
        	font-style: normal;
        	font-weight: 700;
        	src: local('Pretendard-Bold');

        	src : url(./_resource_/_font_/Pretendard-Bold.eot);
        	src : url(./_resource_/_font_/Pretendard-Bold.eot?#iefix) format('embedded-opentype'),
                      url(./_resource_/_font_/Pretendard-Bold.woff2) format('woff2'),
        	      url(./_resource_/_font_/Pretendard-Bold.woff) format('woff');
        }
        </style>
	
	<!-- FRAMEWORK_LIBRARY : framework lodaing path (list of scripts files in the Framework.json file) -->
    <script src="./nexacrolib/framework/Framework.js"></script>
	
	<!-- COMPONENTS_LIBRARY : commonent lodaing path (list of script file in json file specified in the TypeDefinition module) -->
    <script src="./nexacrolib/component/CompBase.js"></script>
    <script src="./nexacrolib/component/ComComp.js"></script>
    <script src="./nexacrolib/component/Grid.js"></script>
    <script src="./nexacrolib/component/ListView.js"></script>
    <script src="./nexacrolib/component/DesktopMDILib/Frame.js"></script>
    <script src="./nexacrolib/component/DesktopMDILib/Util.js"></script>
    <script src="./nexacrolib/component/DesktopMDILib/Comp.js"></script>
    <script src="./nexacrolib/component/DesktopMDILib/Transaction.js"></script>
    <script src="./nexacrolib/component/DesktopMDILib/Popup.js"></script>
    <script src="./nexacrolib/component/DesktopMDILib/Message.js"></script>
    <script src="./nexacrolib/component/DesktopMDILib/Grid.js"></script>
    <script src="./nexacrolib/component/MobileComp.js"></script>
  
	<!-- ENVIRONMENT_LIBRARY : application environment path (path of Environment.xml.js) -->
    <script src="./environment.xml.js"></script>
	
  <!-- SPLASH_DEFINE_STYLE : Defines the style of the splash screen that is visible while modules are loading -->

  
	<title></title>
</head>
<body style="margin:0;border:none;-ms-touch-action:none;" onload="oninitframework()">
	<!-- SPLASH_SHOW_STYLE : Adds the splash screen that is visible while modules are loading -->

  
	<script>
		function oninitframework()
		{
			/* SPLASH_HIDE_STYLE : Hides the splash screen when modules finish loading */

      
			/* SCREEN_INFORMATION : create screen information defined in Environment > ScreenDefinition */
			var screeninfo = [
            {"id":"screen00","type":"desktop","themeid":"theme::DesktopMDI","xadl":"Application_Desktop.xadl.js"}
			];
			nexacro._initHTMLSysEvent(window, document);
			nexacro._initEnvironment(screeninfo);
			/* create internal iframe */
			/* USERFONT_INFORMATION : userfontid property is specified in the Environment */
			nexacro._prepareManagerFrame(onloadframework, [{family:'NotoSansKR', style:'normal', weight:400},{family:'NotoSansKR', style:'normal', weight:700},{family:'Pretendard', style:'normal', weight:400},{family:'Pretendard', style:'normal', weight:700}]);
		}
		function onloadframework()
		{
			/* application loading */
			nexacro._loadADL();
		}
		function onfinalframework()
		{
			/* application exit */
		}
	</script>
</body>
</html>
