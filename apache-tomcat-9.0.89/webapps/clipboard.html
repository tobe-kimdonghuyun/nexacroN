
<button id="readClipboard">클립보드 읽기</button>
<div id="result"></div>

<script>
document.getElementById("readClipboard").addEventListener("click", async () => {
  try {
    // 클립보드의 텍스트 읽기
    const text = await navigator.clipboard.readText();
    document.getElementById("result").innerText = "클립보드 내용: " + text;
  } catch (err) {
    console.error("클립보드 읽기 실패:", err);
  }
});
</script>
