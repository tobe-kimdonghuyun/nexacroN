	<script type="text/javascript">
		util = {}
		util.getParam = function(sname){
			var params = location.search.substr(location.search.indexOf("?")+1);
			var sval="";
			params=params.split("&");
			for(var i=0; i<params.length; i++){
				temp = params[i].split("=");
				if(temp[0]==sname){sval=temp[1];}
			}
			return sval;
		}
		
		//============================================================
		//   모바일앱과의 통신용 - End

		{

			{
				nexacro.getApplication().afnRecvDataFromApp(sData);
			}
		}
		
		function fnSendDataToApp(sData)
		{
			// 모바일앱에서 가이드 한 대로 통신을 실행
		}

		//============================================================

<body style="margin:0;border:none;-ms-touch-action:none;" onload="oninitframework()">
	<div tabIndex="-1" aria-hidden="true"></div> <!-- 웹접근성 '문서끝' 현상-->
	<script>
	function oninitframework()
	{
		<!-- parameter information -->
		var urlParams = {};
		(function () {
			var match,
			pl     = /\+/g,
			search = /([^&=]+)=?([^&]*)/g,
			decode = function (s) { return decodeURIComponent(s.replace(pl, " ")); },
			query  = window.location.search.substring(1);
			while (match = search.exec(query)) { urlParams[decode(match[1])] = decode(match[2]); }
			})();
			
		nexacro._launch_screenid = urlParams.screenid;
		<!-- SCREEN_INFORMATION : create screen information defined in Environment > ScreenDefinition -->
		var screeninfo = [
        {"id":"ScreenDeskTop","type":"desktop","locale":"ko_KR","enableaccessibility":"false","accessibilitydescreadtype":"label,action,description","accessibilityheadingnexthotkey":"ALT+1","accessibilityheadingprevhotkey":"ALT+2","key":"NEIS","tracemode":"new","accessibilitytype":"standard","themeid":"theme::blue","initvaluefileid":"initvalue::accessbility.xiv","xadl":"test_raon.xadl.js"},
        {"id":"mobile","type":"mobile_medium","userzoom":"false","loadingimage":"url(\'theme://images/loading.gif\')","accessibilitytype":"standard","key":"NEIS","themeid":"theme::blue","initvaluefileid":"initvalue::accessbility.xiv","xadl":"test_raon.xadl.js"},
        {"id":"tablet","type":"mobile_large","loadingimage":"url(\'theme://images/loading.gif\')","key":"NEIS","themeid":"theme::blue","initvaluefileid":"initvalue::accessbility.xiv","xadl":"test_raon.xadl.js"}
		];
		
		nexacro._initHTMLSysEvent(window, document);
		nexacro._initEnvironment(screeninfo);
		
		if(util.getParam("eduDgtlOpsUserScCd")){
			nexacro.setInitialVariable("application", "gv_eduDgtlOpsUserScCd", util.getParam("eduDgtlOpsUserScCd"));
		}		
		
		if(util.getParam("subsys")){
			nexacro.setInitialVariable("environment", "ev_subSystemGb", util.getParam("subsys"));
		}				
		if(util.getParam("screenid")){
		    var isMobile = util.getParam("screenid").indexOf("mobile") > -1?"Y":"N"; 
			nexacro.setInitialVariable("environment", "ev_isMobile", isMobile);
		}
		if(util.getParam("menuType")){
			nexacro.setInitialVariable("environment", "ev_menuType", util.getParam("menuType"));
		}
		
		<!-- create internal iframe -->
		<!-- USERFONT_INFORMATION : userfontid property is specified in the Environment -->
		nexacro._prepareManagerFrame(onloadframework, [{family:'NotoSansKR-Regular', style:'normal', weight:400},{family:'NotoSansKR-Medium', style:'normal', weight:500},{family:'NotoSansKR-Bold', style:'normal', weight:700}]);
	}
	function onloadframework()
	{
		<!-- application loading -->
		nexacro._loadADL();
	}
	function onfinalframework()
	{
		<!-- application exit -->
	}
	</script>
