#데이터 베이스 사용유무 (true/false)
DATABASE_USE=false

#데이터 베이스 종류 (인메모리 또는 외부 : IN/OUT) 잘못된 입력시 인메모리 디비로 진행
DATABASE_TYPE=IN
DATABASE_HOST=127.0.0.1
DATABASE_PORT=8509
DATABASE_NAME=appfreedb
#InMemory DB
DATABASE_DRIVER=org.hsqldb.jdbcDriver
DATABASE_URL=jdbc:hsqldb:hsql://127.0.0.1:8509/appfreedb
#Oracle DB
#DATABASE_DRIVER=oracle.jdbc.driver.OracleDriver
#DATABASE_URL=jdbc:oracle:thin:@127.0.0.1:1521:xe
#Callback_value 필드 분할 여부 (true 일 경우 필드를 2개로 나눔 (CALLBACK_VALUE_1, CALLBACK_VALUE_2) / false일 경우 (CALLBACK_VALUE) - 기본값은 false)
DATABASE_CALLBACK_SPLIT=false

DATABASE_PATH=file:database/appfree/data
DATABASE_MAX_CONNECTOR=1000
DATABASE_POOL_CONNECTOR=1000
DATABASE_USERID=appfree
DATABASE_PASSWD=qwer1234
#인메모리 DB 선택시 UserID, Passwd 설정
#DATABASE_USERID=sa
#DATABASE_PASSWD=

#DATABSE_TYPE=OUT 일때 우리의 Appfree 로직을 쓸것인지 말것인지 여부 (true/false)
DATABASE_SERVICE_USE=true
#Appfree DB방식 사용시 사용되는 테이블 명 지정 (Default : AF_SESSION)
APPFREE_TABLE_NAME=AF_SESSION

#10분(단위 : 분)
MAX_SESSION_TIME=10
